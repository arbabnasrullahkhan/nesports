<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Partnerships</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg: #0A0A0A;
            --cyan: #00D4FF;
            --purple: #7B61FF;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            padding-bottom: 100px;
            background: radial-gradient(circle at top right, rgba(0, 212, 255, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(123, 97, 255, 0.05), transparent);
        }

        /* Hero Header */
        .biz-hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 212, 255, 0.1), transparent);
        }
        .biz-hero h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        .biz-hero p { font-size: 14px; opacity: 0.6; max-width: 300px; margin: 0 auto; line-height: 1.6; }

        /* Application Card */
        .form-container { padding: 0 20px; margin-top: -20px; }
        .glass-form {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .type-btn {
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .type-btn.active {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Form Fields */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; opacity: 0.5; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        .input-group input:focus { border-color: var(--cyan); background: rgba(0, 212, 255, 0.02); }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
            transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.96); }

        /* Success Message Overlay */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000; text-align: center;
        }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px); border-radius: 25px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div class="biz-hero">
        <h1>Work with us.</h1>
        <p>Partner with Pakistan's fastest growing Esports ecosystem.</p>
    </div>

    <div class="form-container">
        <div class="glass-form">
            <div class="type-selector">
                <div class="type-btn active" onclick="setType('Sponsor', this)">SPONSOR</div>
                <div class="type-btn" onclick="setType('Promoter', this)">PROMOTER</div>
            </div>

            <div class="input-group">
                <label>Full Name / Brand Name</label>
                <input type="text" id="biz-name" placeholder="Enter name">
            </div>

            <div class="input-group">
                <label>Contact Email / WhatsApp</label>
                <input type="text" id="biz-contact" placeholder="How can we reach you?">
            </div>

            <div id="promoter-fields" style="display: none;">
                <div class="input-group">
                    <label>Social Media Link (YT/TikTok)</label>
                    <input type="text" id="biz-social" placeholder="URL of your channel">
                </div>
            </div>

            <div class="input-group">
                <label>Your Proposal</label>
                <textarea id="biz-msg" rows="4" placeholder="Tell us how you want to collaborate..."></textarea>
            </div>

            <button class="submit-btn" onclick="submitApplication()">SEND PROPOSAL</button>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 60px; margin-bottom: 20px;">🚀</div>
        <h2>Proposal Sent!</h2>
        <p style="opacity: 0.6; margin: 10px 0 30px;">Our team will review your application and contact you soon.</p>
        <button class="type-btn" style="width: 150px; background: white; color: black;" onclick="window.location.href='home.html'">BACK HOME</button>
    </div>

    <nav class="nav-bar">
        <a href="home.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>HOME
        </a>
        <a href="tournaments.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>MATCHES
        </a>
        <a href="sponsor.html" class="nav-item" style="color: var(--cyan);">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>PARTNER
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>PROFILE
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentType = "Sponsor";

        window.setType = (type, btn) => {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('promoter-fields').style.display = (type === 'Promoter') ? 'block' : 'none';
        };

        window.submitApplication = async () => {
            const name = document.getElementById('biz-name').value;
            const contact = document.getElementById('biz-contact').value;
            const msg = document.getElementById('biz-msg').value;
            const social = document.getElementById('biz-social').value;

            if(!name || !contact || !msg) return alert("Please fill all required fields.");

            try {
                await addDoc(collection(db, "applications"), {
                    type: currentType,
                    name: name,
                    contact: contact,
                    proposal: msg,
                    social: social || "N/A",
                    status: "new",
                    timestamp: new Date()
                });

                document.getElementById('success-overlay').style.display = 'flex';
            } catch (e) {
                alert("Error sending proposal. Try again.");
            }
        };
    </script>
</body>
</html>
