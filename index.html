    <style>
        /* 
           ENTERPRISE DESIGN SYSTEM: ROOT VARIABLES 
           Matte Black Base with Cinematic Crimson Accents
        */
        :root {
            --bg-base: #050505;
            --surface: #0A0A0A;
            --surface-elevated: #121212;
            --accent-crimson: #D32F2F;
            --accent-crimson-glow: rgba(211, 47, 47, 0.4);
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --liquid-glass: blur(25px) saturate(180%);
        }

        /* HARDWARE ACCELERATED RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* THE SYSTEM WATERMARK: GLOBAL IDENTITY */
        .system-watermark {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: url('https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png') center/40% no-repeat;
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* TECH GRID OVERLAY */
        .tech-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            opacity: 0.5;
        }

        /* LIQUID GLASS CENTERPIECE */
        .splash-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 400px;
            animation: containerEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes containerEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* PREMIUM PULSE LOGO */
        .brand-logo-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .brand-logo {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0,0,0,1));
            z-index: 2;
            position: relative;
            animation: logoPulse 2.5s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(211, 47, 47, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--accent-crimson-glow)); }
        }

        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            animation: ringExpand 2.5s infinite;
            z-index: 1;
        }

        @keyframes ringExpand {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }

        /* CINEMATIC SYSTEM TEXT */
        .brand-name {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* HARDWARE LOADER SECTION */
        .loader-wrapper {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-track {
            width: 100%;
            height: 2px;
            background: var(--surface-elevated);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }

        .progress-fill {
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-crimson);
            box-shadow: 0 0 15px var(--accent-crimson);
            animation: progressGrow 3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes progressGrow {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 55%; }
            80% { width: 90%; }
            100% { width: 100%; }
        }

        .status-text {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-family: monospace;
            height: 15px;
        }

        /* FLOATING WHATSAPP BUTTON: GLOBAL REQUIREMENT */
        .global-whatsapp-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .global-whatsapp-fab:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .global-whatsapp-fab svg {
            width: 30px;
            height: 30px;

        /* ERROR TOAST (Enterprise Grade Notification) */
        .system-toast {

            top: -100px;
            left: 50%;
            transform: translateX(-50%);

            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 5000;
            transition: 0.5s;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .system-toast.visible { top: 30px; }

<body>

    <!-- CORE FIREBASE SYSTEM INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MASTER FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6",
            measurementId: "G-ELZMHDM7NM"
        };

        // INITIALIZE ENGINES
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDisplay = document.getElementById('status-display');
        const toast = document.getElementById('system-toast');

        // UTILITY: DYNAMIC TOAST
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        // FETCH GLOBAL WHATSAPP CHANNEL LINK FROM ADMIN SETTINGS
        async function loadWhatsAppLink() {
            try {
                const configSnap = await getDoc(doc(db, "admin_settings", "global_config"));
                if (configSnap.exists()) {
                    window.whatsappChannelUrl = configSnap.data().whatsapp_channel || "https://whatsapp.com/channel/0029Va8L7C";
                } else {
                    window.whatsappChannelUrl = "https://whatsapp.com/channel/0029Va8L7C";
                }
            } catch (e) {
                console.error("Link Fetch Error", e);
                window.whatsappChannelUrl = "https://whatsapp.com/channel/0029Va8L7C";
            }
        }

        window.openWhatsAppChannel = () => {
            window.open(window.whatsappChannelUrl, '_blank');
        };

        // THE BOOT SEQUENCE & ROUTING ENGINE
        async function executeBootSequence() {
            await loadWhatsAppLink();
            
            setTimeout(() => { statusDisplay.innerText = "CHECKING_SECURITY_SESSION..."; }, 800);
            setTimeout(() => { statusDisplay.innerText = "AUTHENTICATING_OPERATIVE..."; }, 1600);
            
            // Listen for Session
            setTimeout(() => {
                onAuthStateChanged(auth, async (user) => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetMatch = urlParams.get('matchId');
                    const targetRef = urlParams.get('refCode');

                    if (user) {
                        statusDisplay.innerText = "ACCESS_GRANTED_DEB_01";
                        statusDisplay.style.color = "#4CAF50";

                        // Handle Dynamic Direct Routing
                        if (targetMatch) {
                            sessionStorage.setItem('targetMatchId', targetMatch);
                            setTimeout(() => { window.location.href = "/arena"; }, 500);
                        } else if (targetRef) {
                            sessionStorage.setItem('referralCode', targetRef);
                            setTimeout(() => { window.location.href = "/home"; }, 500);
                        } else {
                            setTimeout(() => { window.location.href = "/home"; }, 500);
                        }
                    } else {
                        statusDisplay.innerText = "REDIRECTING_TO_AUTH_PORTAL...";
                        
                        // Preserve redirect intent for post-login
                        if (targetMatch) sessionStorage.setItem('pendingMatchRedirect', targetMatch);
                        if (targetRef) sessionStorage.setItem('pendingRefCode', targetRef);

                        setTimeout(() => { window.location.href = "/auth"; }, 500);
                    }
                });
            }, 2500);
        }

        // INITIALIZE BOOT
        window.addEventListener('load', executeBootSequence);

        // PREVENT BACK BUTTON DURING SPLASH
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
