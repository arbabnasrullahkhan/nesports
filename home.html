<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NE SPORTS | Dashboard</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* Enterprise Design System */
        :root {
            --bg-base: #050505;
            --surface: #121212;
            --surface-elevated: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-red: #D32F2F;
            --accent-red-hover: #B71C1C;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(18, 18, 18, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            padding-bottom: 90px; /* Space for Bottom Nav */
            overflow-x: hidden;
        }

        /* Dynamic Island Header */
        .dynamic-island {
            position: fixed;
            top: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px 0 10px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .user-snippet { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--surface-elevated); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
        .user-level { font-size: 10px; color: var(--accent-red); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .wallet-pill {
            background: var(--surface-elevated);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex; align-items: center; gap: 6px;
            border: 1px solid var(--border-subtle);
        }
        .wallet-pill svg { width: 14px; height: 14px; fill: var(--text-muted); }
        .wallet-pill span { font-size: 13px; font-weight: 700; }

        /* Cinematic Hero Banner */
        .hero-section { margin-top: 95px; padding: 0 20px; }
        .hero-card {
            width: 100%; height: 200px;
            background: linear-gradient(to right, rgba(5,5,5,0.9), rgba(5,5,5,0.2)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=1000') center/cover;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; justify-content: center;
            padding: 25px; position: relative; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }
        .live-badge {
            position: absolute; top: 20px; right: 20px;
            background: rgba(211, 47, 47, 0.2); border: 1px solid var(--accent-red);
            color: var(--accent-red); font-size: 10px; font-weight: 800;
            padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 5px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--accent-red); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(211, 47, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); } }
        
        .hero-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .hero-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; max-width: 200px; }
        .hero-btn {
            background: var(--text-main); color: var(--bg-base);
            padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 800;
            border: none; width: max-content; cursor: pointer; text-transform: uppercase;
        }

        /* Section Titles */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 20px 15px;
        }
        .section-title { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .section-link { font-size: 11px; color: var(--accent-red); font-weight: 600; cursor: pointer; text-decoration: none; text-transform: uppercase; }

        /* Tournament Cards Grid */
        .arena-grid { padding: 0 20px; display: grid; gap: 15px; }
        .arena-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 15px;
            display: flex; gap: 15px; align-items: center;
            transition: 0.3s;
        }
        .arena-card:active { transform: scale(0.98); background: var(--surface-elevated); }
        .arena-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: var(--surface-elevated); }
        .arena-info { flex: 1; }
        .arena-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .arena-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
        .arena-meta div { display: flex; align-items: center; gap: 4px; }
        .arena-meta svg { width: 12px; height: 12px; fill: var(--text-muted); }
        
        .arena-bottom { display: flex; justify-content: space-between; align-items: center; }
        .arena-prize { font-size: 14px; font-weight: 800; color: var(--text-main); }
        .arena-join {
            background: rgba(255,255,255,0.05); color: var(--text-main);
            padding: 6px 16px; border-radius: 8px; font-size: 11px; font-weight: 700;
            border: 1px solid var(--border-subtle); cursor: pointer; text-transform: uppercase;
        }

        /* Bottom App Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: var(--text-muted); transition: 0.3s;
        }
        .nav-item svg { width: 22px; height: 22px; fill: var(--text-muted); transition: 0.3s; }
        .nav-item span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Active State */
        .nav-item.active { color: var(--accent-red); }
        .nav-item.active svg { fill: var(--accent-red); filter: drop-shadow(0 2px 8px rgba(211,47,47,0.4)); }

    </style>
</head>
<body>

    <!-- Dynamic Island Header -->
    <header class="dynamic-island" onclick="window.location.href='/profile'">
        <div class="user-snippet">
            <img id="user-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="User" class="user-avatar">
            <div class="user-info">
                <span class="user-name" id="user-name">Loading...</span>
                <span class="user-level" id="user-level">SYSTEM BOOT</span>
            </div>
        </div>
        <div class="wallet-pill">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span id="user-wallet">0</span>
        </div>
    </header>

    <!-- Cinematic Hero -->
    <div class="hero-section">
        <div class="hero-card">
            <div class="live-badge"><div class="live-dot"></div> LIVE EVENT</div>
            <h1>PUBG MOBILE</h1>
            <p>Premium Solo Showdown. Enter the arena and claim the bounty.</p>
            <button class="hero-btn" onclick="window.location.href='/tournaments'">ENTER ARENA</button>
        </div>
    </div>

    <!-- Active Tournaments -->
    <div class="section-header">
        <div class="section-title">Active Deployments</div>
        <a href="/tournaments" class="section-link">View All</a>
    </div>

    <div class="arena-grid" id="arena-list">
        <!-- Skeleton Loader -->
        <div class="arena-card" style="opacity: 0.5;">
            <div class="arena-thumb"></div>
            <div class="arena-info">
                <div style="height: 14px; width: 60%; background: var(--surface-elevated); margin-bottom: 8px; border-radius: 4px;"></div>
                <div style="height: 10px; width: 40%; background: var(--surface-elevated); border-radius: 4px;"></div>
            </div>
        </div>
    </div>

    <!-- iOS Native Style Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="/tournaments" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>
            <span>Arena</span>
        </a>
        <a href="/wallet" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Vault</span>
        </a>
        <a href="/profile" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Core App Logic -->
    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, collection, query, where, limit, getDocs } from './firebase-config.js';

        // 1. Authenticate and Load User Data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('user-name').innerText = data.name;
                    document.getElementById('user-wallet').innerText = data.wallet;
                    document.getElementById('user-level').innerText = data.level + " TIER";
                    document.getElementById('user-avatar').src = data.avatar;
                }
                loadDeployments(); // Load matches
            } else {
                window.location.replace("/auth");
            }
        });

        // 2. Fetch Live Tournaments (Max 3 for Dashboard)
        async function loadDeployments() {
            const listEl = document.getElementById('arena-list');
            const q = query(collection(db, "tournaments"), where("status", "==", "open"), limit(3));
            const snap = await getDocs(q);

            listEl.innerHTML = "";

            if (snap.empty) {
                listEl.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">NO ACTIVE DEPLOYMENTS.</div>`;
                return;
            }

            snap.forEach(doc => {
                const t = doc.data();
                listEl.innerHTML += `
                    <div class="arena-card">
                        <img src="${t.image || 'https://via.placeholder.com/70x70/1E1E1E/FFFFFF?text=MATCH'}" class="arena-thumb">
                        <div class="arena-info">
                            <h3 class="arena-title">${t.title}</h3>
                            <div class="arena-meta">
                                <div><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg> ${t.game}</div>
                                <div><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> ${t.joined || 0}/${t.totalSlots}</div>
                            </div>
                            <div class="arena-bottom">
                                <span class="arena-prize">PKR ${t.prize}</span>
                                <button class="arena-join" onclick="window.location.href='/tournaments'">DETAILS</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
