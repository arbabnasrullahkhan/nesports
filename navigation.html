<!-- [NE SPORTS SHARED COMPONENT: NAVIGATION VERSION 7.7] -->
<style>
    :root {
        --nav-height: 70px;
        --nav-bg: rgba(10, 10, 10, 0.8);
        --nav-border: rgba(255, 255, 255, 0.08);
        --nav-active: #D32F2F;
        --nav-inactive: rgba(255, 255, 255, 0.4);
        --z-nav: 4000;
        --z-fab: 4500;
    }

    /* Bottom Navigation Container */
    .nav-container {
        position: fixed;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 92%;
        max-width: 500px;
        height: var(--nav-height);
        background: var(--nav-bg);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--nav-border);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 10px;
        z-index: var(--z-nav);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        animation: navSlideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes navSlideUp {
        from { transform: translate(-50%, 100px); opacity: 0; }
        to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* Navigation Items */
    .nav-item {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        gap: 5px;
        transition: all 0.3s ease;
        position: relative;
    }

    .nav-item svg {
        width: 22px;
        height: 22px;
        fill: var(--nav-inactive);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), fill 0.3s ease;
    }

    .nav-item span {
        font-size: 10px;
        font-weight: 700;
        color: var(--nav-inactive);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: color 0.3s ease;
    }

    /* Active State Styling */
    .nav-item.active svg {
        fill: var(--nav-active);
        transform: translateY(-2px);
        filter: drop-shadow(0 2px 10px rgba(211, 47, 47, 0.5));
    }

    .nav-item.active span {
        color: var(--nav-active);
    }

    /* Indicator dot for active item */
    .nav-item.active::after {
        content: "";
        position: absolute;
        bottom: 8px;
        width: 4px;
        height: 4px;
        background: var(--nav-active);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--nav-active);
    }

    /* Floating WhatsApp Button */
    .floating-wa-btn {
        position: fixed;
        right: 20px;
        bottom: 100px; /* Above the bottom nav */
        width: 50px;
        height: 50px;
        background: #25D366;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        z-index: var(--z-fab);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        animation: waPulse 2s infinite;
    }

    .floating-wa-btn:active {
        transform: scale(0.9);
    }

    .floating-wa-btn svg {
        width: 28px;
        height: 28px;
        fill: white;
    }

    @keyframes waPulse {
        0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
        100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    /* Desktop/Wide screen adjustment */
    @media (min-width: 768px) {
        .nav-container {
            width: 400px;
        }
        .floating-wa-btn {
            right: calc(50% - 250px);
        }
    }
</style>

<!-- [NE SPORTS NAVIGATION LOGIC ENGINE] -->
<script type="module">
    import { db, doc, onSnapshot } from './firebase-config.js';

    // 1. Dynamic Active Link Detection
    const updateActiveNav = () => {
        const path = window.location.pathname;
        const navMap = {
            '/home': 'nav-home',
            '/tournaments': 'nav-arena',
            '/leaderboard': 'nav-ranks',
            '/wallet': 'nav-wallet',
            '/more': 'nav-more'
        };

        // Reset all
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

        // Apply active class
        const activeId = navMap[path];
        if (activeId) {
            document.getElementById(activeId).classList.add('active');
        }
    };

    // 2. Real-time Admin Controlled WhatsApp Channel Link
    const syncWAChannel = () => {
        const waRef = doc(db, "system_config", "external_links");
        onSnapshot(waRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.whatsapp_channel) {
                    document.getElementById('global-wa-channel').href = data.whatsapp_channel;
                }
            } else {
                // Fallback link if document doesn't exist
                document.getElementById('global-wa-channel').href = "https://whatsapp.com/channel/fallback_id";
            }
        });
    };

    // Initialize
    window.addEventListener('load', () => {
        updateActiveNav();
        syncWAChannel();
    });

    // Handle single-page-app style navigation changes if applicable
    window.addEventListener('popstate', updateActiveNav);

</script>
