<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operative Profile | NE SPORTS</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* [GLOBAL THEME VARIABLES] */
        :root {
            --bg-base: #050505;
            --surface-matte: #0A0A0A;
            --surface-elevated: #151515;
            --accent-primary: #D32F2F; /* Default User Crimson */
            --accent-gold: #D4AF37;    /* Ambassador Gold */
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Ambassador Mode Override */
        body.mode-ambassador {
            --accent-primary: var(--accent-gold);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Shared Component Mounts */
        #header-mount { width: 100%; height: 80px; position: fixed; top: 0; z-index: 5000; }
        #navigation-mount { width: 100%; position: fixed; bottom: 0; z-index: 4000; }

        /* [1. PROFILE HERO] */
        .profile-hero {
            padding: 120px 20px 40px;
            text-align: center;
            background: linear-gradient(180deg, rgba(211, 47, 47, 0.08) 0%, var(--bg-base) 100%);
            border-bottom: 1px solid var(--border-glass);
            transition: var(--transition);
        }
        body.mode-ambassador .profile-hero {
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.1) 0%, var(--bg-base) 100%);
        }

        .avatar-wrap {
            position: relative; width: 110px; height: 110px; margin: 0 auto 20px;
        }
        .main-avatar {
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent-primary);
            padding: 5px; background: var(--surface-matte); object-fit: cover;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }
        .verified-badge {
            position: absolute; bottom: 5px; right: 5px; width: 28px; height: 28px;
            background: var(--accent-primary); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; border: 3px solid var(--bg-base);
        }
        .verified-badge svg { width: 14px; height: 14px; fill: white; }

        .op-name { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .op-tier { font-size: 10px; font-weight: 800; color: var(--accent-primary); letter-spacing: 2px; text-transform: uppercase; }

        /* [2. ENTERPRISE STATS] */
        .stats-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 25px 20px;
        }
        .stat-card {
            background: var(--surface-matte); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 15px 10px; text-align: center;
        }
        .s-val { font-size: 18px; font-weight: 900; color: #fff; display: block; margin-bottom: 4px; }
        .s-lbl { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        /* [3. ACTION GRID] */
        .action-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px 30px;
        }
        .action-item {
            background: var(--surface-elevated); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            text-decoration: none; color: white; transition: var(--transition);
        }
        .action-item:active { transform: scale(0.96); background: var(--surface-matte); }
        .a-icon { width: 32px; height: 32px; fill: var(--accent-primary); }
        .a-text { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* [4. AMBASSADOR COMMAND MODULE] */
        #ambassador-module {
            display: none; padding: 0 20px 30px;
        }
        .amb-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0));
            border: 1px solid var(--accent-gold); border-radius: 24px; padding: 25px;
            position: relative; overflow: hidden;
        }
        .amb-card::before {
            content: "VIP"; position: absolute; top: -10px; right: -10px; font-size: 60px;
            font-weight: 900; color: var(--accent-gold); opacity: 0.05;
        }
        .ref-box {
            background: rgba(0,0,0,0.4); border: 1px dashed var(--accent-gold);
            border-radius: 12px; padding: 15px; margin-top: 15px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .ref-code { font-family: monospace; font-size: 16px; font-weight: 800; color: var(--accent-gold); }
        .btn-copy { background: var(--accent-gold); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* [5. TROPHY ROOM] */
        .section-title { padding: 0 20px 15px; font-size: 12px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .badge-row {
            display: flex; gap: 15px; padding: 0 20px 40px; overflow-x: auto; scrollbar-width: none;
        }
        .badge-item {
            min-width: 90px; height: 110px; background: var(--surface-matte); border: 1px solid var(--border-glass);
            border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            opacity: 0.3; filter: grayscale(1); transition: var(--transition);
        }
        .badge-item.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--accent-primary); }
        .badge-item svg { width: 36px; height: 36px; fill: var(--accent-primary); }
        .badge-name { font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* [6. LOGOUT] */
        .logout-area { padding: 0 20px 120px; }
        .btn-logout {
            width: 100%; padding: 18px; background: rgba(211, 47, 47, 0.1); border: 1px solid rgba(211, 47, 47, 0.2);
            border-radius: 16px; color: #D32F2F; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

    </style>
</head>
<body id="profile-body">

    <div id="loader-mount"></div>
    <div id="header-mount"></div>

    <main id="main-profile" style="opacity: 0; transition: 0.6s;">
        
        <!-- [HERO SECTION] -->
        <section class="profile-hero">
            <div class="avatar-wrap">
                <img id="u-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Operative" class="main-avatar">
                <div class="verified-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
            </div>
            <h1 class="op-name" id="u-name">SYSTEM_OFFLINE</h1>
            <div class="op-tier" id="u-tier">RANK: INITIALIZING</div>
        </section>

        <!-- [STATS GRID] -->
        <section class="stats-container">
            <div class="stat-card"><span class="s-val" id="s-wins">0</span><span class="s-lbl">Wins</span></div>
            <div class="stat-card"><span class="s-val" id="s-kills">0</span><span class="s-lbl">Kills</span></div>
            <div class="stat-card"><span class="s-val" id="s-earnings">0</span><span class="s-lbl">Earnings</span></div>
        </section>

        <!-- [AMBASSADOR COMMAND MODULE] -->
        <section id="ambassador-module">
            <div class="section-title">Influencer Intelligence</div>
            <div class="amb-card">
                <h3 style="font-size: 16px; font-weight: 900; text-transform: uppercase; color: var(--accent-gold);">Elite Command Panel</h3>
                <p style="font-size: 11px; color: var(--text-dim); margin-top: 5px;">Track your referral conversions and revenue performance.</p>
                
                <div class="stats-container" style="padding: 20px 0 0; grid-template-columns: 1fr 1fr;">
                    <div class="stat-card" style="background: rgba(255,255,255,0.03);"><span class="s-val" id="amb-refs">0</span><span class="s-lbl">Referrals</span></div>
                    <div class="stat-card" style="background: rgba(255,255,255,0.03);"><span class="s-val" id="amb-comm">0</span><span class="s-lbl">Commission</span></div>
                </div>

                <div class="ref-box">
                    <span class="ref-code" id="u-ref-link">NES-XXXXXX</span>
                    <button class="btn-copy" onclick="copyRef()">Copy Link</button>
                </div>
            </div>
        </section>

        <!-- [ACTION GRID] -->
        <div class="section-title">Operational Access</div>
        <section class="action-grid">
            <a href="/settings" class="action-item">
                <svg class="a-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                <span class="a-text">Settings</span>
            </a>
            <a href="/teams" class="action-item">
                <svg class="a-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                <span class="a-text">My Squad</span>
            </a>
            <a href="/marketplace" class="action-item">
                <svg class="a-icon" viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2c0 .55.45 1 1 1v5h10v-5h6c.55 0 1-.45 1-1zm-9 4H5v-4h7v4z"/></svg>
                <span class="a-text">Marketplace</span>
            </a>
            <a href="/legal" class="action-item">
                <svg class="a-icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
                <span class="a-text">Refunds</span>
            </a>
        </section>

        <!-- [TROPHY ROOM] -->
        <div class="section-title">Trophy Room</div>
        <section class="badge-row">
            <div class="badge-item unlocked" id="badge-verified">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <span class="badge-name">Verified</span>
            </div>
            <div class="badge-item" id="badge-slayer">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                <span class="badge-name">Slayer</span>
            </div>
            <div class="badge-item" id="badge-elite">
                <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.83L19.17 19H4.83L12 5.83z"/></svg>
                <span class="badge-name">Elite</span>
            </div>
        </section>

        <section class="logout-area">
            <button class="btn-logout" onclick="userLogout()">Terminate Session</button>
        </section>

        <div id="footer-mount"></div>
    </main>

    <div id="navigation-mount"></div>

    <!-- [CORE PROFILE LOGIC ENGINE] -->
    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, onSnapshot, signOut } from './firebase-config.js';

        let currentUser = null;

        // 1. Component Mounting
        async function loadComponent(id, file) {
            const res = await fetch(file);
            document.getElementById(id).innerHTML = await res.text();
            const scripts = document.getElementById(id).querySelectorAll('script');
            scripts.forEach(s => {
                const ns = document.createElement('script');
                ns.type = 'module'; ns.textContent = s.textContent;
                document.body.appendChild(ns);
            });
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('loader-mount', '/loader.html');
            await loadComponent('header-mount', '/header.html');
            await loadComponent('navigation-mount', '/navigation.html');
            await loadComponent('footer-mount', '/footer.html');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('main-profile').style.opacity = '1';
                    syncProfileData();
                } else { window.location.replace('/auth'); }
            });
        });

        // 2. Real-time Profile Synchronization
        function syncProfileData() {
            onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Basic Identity
                    document.getElementById('u-name').innerText = data.name || "Unknown Operative";
                    document.getElementById('u-avatar').src = data.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.name}`;
                    document.getElementById('u-tier').innerText = `RANK: ${data.level || 'BRONZE'}`;
                    
                    // Stats
                    document.getElementById('s-wins').innerText = data.totalWins || 0;
                    document.getElementById('s-kills').innerText = data.totalKills || 0;
                    document.getElementById('s-earnings').innerText = (data.totalEarnings || 0).toLocaleString();

                    // AMBASSADOR LOGIC (THE MASTER SWITCH)
                    if (data.isAmbassador === true) {
                        document.body.classList.add('mode-ambassador');
                        document.getElementById('ambassador-module').style.display = 'block';
                        document.getElementById('u-tier').innerText = "OFFICIAL BRAND AMBASSADOR";
                        document.getElementById('u-ref-link').innerText = data.referralCode || "NES-GEN-001";
                        document.getElementById('amb-refs').innerText = data.referralCount || 0;
                        document.getElementById('amb-comm').innerText = (data.referralEarnings || 0).toLocaleString();
                    } else {
                        document.body.classList.remove('mode-ambassador');
                        document.getElementById('ambassador-module').style.display = 'none';
                    }

                    // Achievement Unlock Logic
                    if (data.totalKills >= 100) document.getElementById('badge-slayer').classList.add('unlocked');
                    if (data.level === 'LEGEND') document.getElementById('badge-elite').classList.add('unlocked');
                }
            });
        }

        // 3. Helper Functions
        window.copyRef = () => {
            const code = document.getElementById('u-ref-link').innerText;
            const fullLink = `https://nesports.vercel.app/auth?ref=${code}`;
            navigator.clipboard.writeText(fullLink);
            alert("Ambassador Referral Link Copied to Clipboard!");
        };

        window.userLogout = () => {
            if(confirm("Are you sure you want to exit the NE SPORTS ecosystem?")) {
                signOut(auth).then(() => {
                    window.location.replace('/auth');
                });
            }
        };

    </script>
</body>
</html>
