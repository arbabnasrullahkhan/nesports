<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Squad Hub</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg: #0A0A0A;
            --cyan: #00D4FF;
            --purple: #7B61FF;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            padding-bottom: 100px;
            background: radial-gradient(circle at top left, rgba(0, 212, 255, 0.1), transparent);
        }

        /* Header Tabs */
        .tab-bar {
            display: flex;
            padding: 20px;
            gap: 10px;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* Create Team Section */
        .content-section { padding: 20px; display: none; }
        .content-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .team-card {
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.1), rgba(0, 212, 255, 0.1));
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-size: 11px; opacity: 0.6; margin-left: 10px; }
        .input-group input {
            width: 100%; padding: 15px; background: var(--glass);
            border: 1px solid var(--glass-border); border-radius: 15px;
            color: white; margin-top: 5px; outline: none;
        }

        .primary-btn {
            width: 100%; padding: 15px; background: var(--cyan);
            color: black; border: none; border-radius: 15px;
            font-weight: 800; cursor: pointer;
        }

        /* Clan List */
        .clan-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .clan-rank { width: 30px; font-weight: 900; color: var(--cyan); }
        .clan-logo { width: 45px; height: 45px; border-radius: 12px; margin: 0 15px; background: #222; }
        .clan-info { flex: 1; }
        .clan-info h4 { font-size: 15px; }
        .clan-info p { font-size: 11px; opacity: 0.5; }
        .clan-points { text-align: right; font-weight: 800; color: #FFD700; }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px); border-radius: 25px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--cyan); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab-btn active" onclick="switchTab('my-team', this)">MY SQUAD</div>
        <div class="tab-btn" onclick="switchTab('rankings', this)">CLAN RANKS</div>
    </div>

    <!-- My Team Section -->
    <div id="my-team" class="content-section active">
        <div id="no-team-view">
            <div class="team-card">
                <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
                <h2>No Squad Found</h2>
                <p style="font-size: 13px; opacity: 0.6; margin-bottom: 25px;">Create your own squad or join an existing one using a team code.</p>
                
                <div class="input-group">
                    <label>Squad Name</label>
                    <input type="text" id="team-name" placeholder="e.g. Team Nexra">
                </div>
                <button class="primary-btn" onclick="createTeam()">Create Squad</button>
                
                <div style="margin: 20px 0; opacity: 0.3;">——— OR ———</div>
                
                <div class="input-group">
                    <label>Team Code</label>
                    <input type="text" id="join-code" placeholder="Enter 6-digit code">
                </div>
                <button class="primary-btn" style="background: white;" onclick="joinTeam()">Join Squad</button>
            </div>
        </div>

        <div id="team-details-view" style="display: none;">
            <!-- Will be populated if user has a team -->
            <div class="team-card">
                <h1 id="display-team-name">Squad Name</h1>
                <p id="display-team-code" style="color: var(--cyan); font-family: monospace; letter-spacing: 2px;">CODE: ------</p>
                <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px;" id="team-members">
                    <!-- Member Avatars -->
                </div>
            </div>
        </div>
    </div>

    <!-- Clan Rankings Section -->
    <div id="rankings" class="content-section">
        <div id="clan-list">
            <!-- Dynamic Clan List -->
            <p style="text-align: center; opacity: 0.5;">Loading Clan Rankings...</p>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="home.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>HOME
        </a>
        <a href="tournaments.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>MATCHES
        </a>
        <a href="teams.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>SQUAD
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>PROFILE
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                checkUserTeam();
                loadClanRankings();
            } else {
                window.location.href = "auth.html";
            }
        });

        window.switchTab = (tabId, btn) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        };

        async function checkUserTeam() {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const userData = userDoc.data();
            
            if (userData.teamId) {
                document.getElementById('no-team-view').style.display = "none";
                document.getElementById('team-details-view').style.display = "block";
                loadTeamDetails(userData.teamId);
            }
        }

        window.createTeam = async () => {
            const name = document.getElementById('team-name').value;
            if (!name) return alert("Enter Squad Name");

            const teamId = "TEAM-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            await setDoc(doc(db, "teams", teamId), {
                name: name,
                leader: currentUser.uid,
                members: [currentUser.uid],
                points: 0,
                createdAt: new Date()
            });

            await updateDoc(doc(db, "users", currentUser.uid), {
                teamId: teamId
            });

            alert("Squad Created Successfully!");
            location.reload();
        };

        async function loadTeamDetails(id) {
            const teamDoc = await getDoc(doc(db, "teams", id));
            if (teamDoc.exists()) {
                const data = teamDoc.data();
                document.getElementById('display-team-name').innerText = data.name;
                document.getElementById('display-team-code').innerText = "CODE: " + id;
            }
        }

        async function loadClanRankings() {
            const q = query(collection(db, "teams"), orderBy("points", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('clan-list');
            list.innerHTML = "";

            let rank = 1;
            snap.forEach(doc => {
                const clan = doc.data();
                list.innerHTML += `
                    <div class="clan-item">
                        <div class="clan-rank">#${rank++}</div>
                        <div class="clan-logo" style="background: linear-gradient(45deg, var(--purple), var(--cyan))"></div>
                        <div class="clan-info">
                            <h4>${clan.name}</h4>
                            <p>${clan.members.length} Members</p>
                        </div>
                        <div class="clan-points">${clan.points} PTS</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
