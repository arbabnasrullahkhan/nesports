<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NE SPORTS | Operative Profile</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* Enterprise Design System */
        :root {
            --bg-base: #050505;
            --surface: #121212;
            --surface-elevated: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-red: #D32F2F;
            --accent-red-hover: #B71C1C;
            --gold-vip: #D4AF37;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(18, 18, 18, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base); color: var(--text-main);
            padding-bottom: 90px; overflow-x: hidden;
        }

        /* Profile Hero Section */
        .profile-hero {
            position: relative; padding: 50px 20px 30px;
            background: linear-gradient(to bottom, rgba(211, 47, 47, 0.05), var(--bg-base));
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .avatar-container { position: relative; margin-bottom: 15px; }
        .user-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--surface-elevated);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            background: var(--surface); object-fit: cover;
        }
        .vip-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--gold-vip); color: #000;
            width: 28px; height: 28px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            border: 2px solid var(--bg-base); box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4);
        }
        .vip-badge svg { width: 14px; height: 14px; fill: #000; }

        .user-name { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .user-tier { font-size: 11px; color: var(--accent-red); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            padding: 20px;
        }
        .stat-box {
            background: var(--surface); border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Achievements / Trophy Room */
        .section-header { padding: 10px 20px; font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .achievements-scroll {
            display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none;
            padding: 0 20px 20px;
        }
        .achievements-scroll::-webkit-scrollbar { display: none; }
        
        .badge-card {
            min-width: 90px; background: var(--surface); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 15px 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            opacity: 0.5; filter: grayscale(100%); transition: 0.3s;
        }
        .badge-card.unlocked { opacity: 1; filter: grayscale(0%); border-color: rgba(211, 47, 47, 0.3); background: linear-gradient(180deg, rgba(211,47,47,0.05), var(--surface)); }
        .badge-card svg { width: 32px; height: 32px; fill: var(--text-main); }
        .badge-card.unlocked svg { fill: var(--accent-red); }
        .badge-name { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* Referral Engine */
        .referral-box {
            margin: 0 20px 20px; background: var(--surface-elevated); border: 1px dashed var(--border-subtle);
            border-radius: 16px; padding: 20px; text-align: center; position: relative; overflow: hidden;
        }
        .ref-title { font-size: 14px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
        .ref-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 15px; }
        .ref-code-area { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .ref-code { font-family: monospace; font-size: 18px; font-weight: 800; color: var(--accent-red); letter-spacing: 2px; }
        .copy-btn { background: var(--text-main); color: var(--bg-base); border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* Action Menu (Redirects & Settings) */
        .action-menu { padding: 0 20px 20px; }
        .menu-item {
            background: var(--surface); border: 1px solid var(--border-subtle);
            padding: 16px; border-radius: 12px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; text-decoration: none; color: var(--text-main);
        }
        .menu-item:active { transform: scale(0.98); background: var(--surface-elevated); }
        .menu-icon { width: 20px; height: 20px; fill: var(--text-muted); }
        .menu-text { flex: 1; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .menu-arrow { width: 16px; height: 16px; fill: var(--border-subtle); }

        .btn-logout { background: rgba(211, 47, 47, 0.1); border-color: rgba(211, 47, 47, 0.3); color: var(--accent-red); margin-top: 20px; }
        .btn-logout .menu-icon { fill: var(--accent-red); }
        .btn-logout .menu-text { color: var(--accent-red); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--glass-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); }
        .nav-item svg { width: 22px; height: 22px; fill: var(--text-muted); }
        .nav-item span { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: var(--accent-red); }
        .nav-item.active svg { fill: var(--accent-red); }
    </style>
</head>
<body>

    <div class="profile-hero">
        <div class="avatar-container">
            <img id="p-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Avatar" class="user-avatar">
            <div id="p-vip-badge" class="vip-badge">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
        </div>
        <div class="user-name" id="p-name">LOADING...</div>
        <div class="user-tier" id="p-level">SYS BOOT</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-value" id="s-xp">0</div>
            <div class="stat-label">Total XP</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="s-matches">0</div>
            <div class="stat-label">Matches</div>
        </div>
    </div>

    <!-- Trophy Room -->
    <div class="section-header">Trophy Room</div>
    <div class="achievements-scroll">
        <div class="badge-card unlocked">
            <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.83L19.17 19H4.83L12 5.83z"/></svg>
            <span class="badge-name">Initiate</span>
        </div>
        <div class="badge-card" id="badge-veteran">
            <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span class="badge-name">Veteran</span>
        </div>
        <div class="badge-card" id="badge-slayer">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            <span class="badge-name">Slayer</span>
        </div>
    </div>

    <!-- Referral Engine -->
    <div class="referral-box">
        <h4 class="ref-title">Recruitment Protocol</h4>
        <p class="ref-desc">Invite operatives. Earn 50 PKR for every successful deployment.</p>
        <div class="ref-code-area">
            <span class="ref-code" id="p-refcode">NES-XXXX</span>
            <button class="copy-btn" onclick="copyRef()">COPY</button>
        </div>
    </div>

    <!-- Action Menu / Redirects -->
    <div class="action-menu">
        <!-- Redirect to Settings -->
        <a href="/settings" class="menu-item">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.35,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.5c-1.93,0-3.5-1.57-3.5-3.5 s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z"/></svg>
            <span class="menu-text">Control Center (Settings)</span>
            <svg class="menu-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </a>

        <!-- Redirect to Teams -->
        <a href="/teams" class="menu-item">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span class="menu-text">My Squad</span>
            <svg class="menu-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </a>

        <!-- Redirect to VIP Ambassador -->
        <a href="/ambassador" class="menu-item">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span class="menu-text">VIP Hub (Ambassador)</span>
            <svg class="menu-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </a>

        <!-- Firebase Logout -->
        <div class="menu-item btn-logout" onclick="sysLogout()">
            <svg class="menu-icon" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span class="menu-text">Terminate Session (Logout)</span>
        </div>
    </div>

    <!-- Bottom App Navigation -->
    <nav class="bottom-nav">
        <a href="/home" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span>
        </a>
        <a href="/tournaments" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg><span>Arena</span>
        </a>
        <a href="/wallet" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg><span>Vault</span>
        </a>
        <a href="/profile" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, getDoc } from './firebase-config.js';

        // Listen to Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch User Data
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    
                    // Populate Header Elements
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-avatar').src = data.avatar;
                    document.getElementById('p-level').innerText = "TIER: " + data.level;
                    
                    // Populate Stats
                    document.getElementById('s-xp').innerText = data.xp || 0;
                    document.getElementById('s-matches').innerText = data.matchesPlayed || 0;

                    // Populate Referral Code
                    document.getElementById('p-refcode').innerText = data.referralCode || "N/A";

                    // Ambassador / VIP Check
                    if (data.isAmbassador) {
                        document.getElementById('p-vip-badge').style.display = "flex";
                        document.getElementById('p-name').style.color = "var(--gold-vip)";
                    }

                    // Achievement Logic (Example: Unlock Veteran if matches > 10)
                    if (data.matchesPlayed >= 10) {
                        document.getElementById('badge-veteran').classList.add('unlocked');
                    }
                    // Unlock Slayer if XP > 1000
                    if (data.xp >= 1000) {
                        document.getElementById('badge-slayer').classList.add('unlocked');
                    }
                }
            } else {
                window.location.replace("/auth");
            }
        });

        // Copy Referral Logic
        window.copyRef = () => {
            const code = document.getElementById('p-refcode').innerText;
            navigator.clipboard.writeText(code);
            alert("Recruitment Code Copied: " + code);
        };

        // Secure Logout Logic
        window.sysLogout = () => {
            if(confirm("Are you sure you want to terminate the session?")) {
                signOut(auth).then(() => {
                    window.location.replace("/auth");
                }).catch((error) => {
                    alert("Error: " + error.message);
                });
            }
        };
    </script>
</body>
</html>
