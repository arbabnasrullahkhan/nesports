<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NE SPORTS | Control Center</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        :root {
            --bg-base: #050505;
            --surface: #121212;
            --surface-elevated: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-red: #D32F2F;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(18, 18, 18, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }

        body {
            background-color: var(--bg-base); color: var(--text-main);
            padding: 20px; padding-bottom: 100px;
        }

        /* Header */
        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { background: var(--surface); border: 1px solid var(--border-subtle); padding: 10px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .back-btn svg { width: 20px; height: 20px; fill: var(--text-main); }
        .page-title { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Settings Sections */
        .settings-group { margin-bottom: 30px; }
        .group-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; padding-left: 5px; }
        
        .setting-card {
            background: var(--surface); border: 1px solid var(--border-subtle);
            border-radius: 16px; overflow: hidden;
        }
        
        .setting-item {
            padding: 16px; border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s;
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-item:active { background: var(--surface-elevated); }
        
        .icon-box { width: 36px; height: 36px; background: rgba(255,255,255,0.03); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .icon-box svg { width: 18px; height: 18px; fill: var(--text-muted); }
        
        .setting-info { flex: 1; }
        .setting-label { font-size: 14px; font-weight: 600; display: block; }
        .setting-desc { font-size: 11px; color: var(--text-muted); }

        /* Input Modal Style */
        .input-box { width: 100%; background: var(--surface-elevated); border: 1px solid var(--border-subtle); padding: 12px; border-radius: 10px; color: #fff; font-size: 14px; margin-top: 10px; outline: none; }
        .input-box:focus { border-color: var(--accent-red); }

        .btn-save { width: 100%; padding: 15px; background: var(--accent-red); color: white; border: none; border-radius: 12px; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-top: 20px; cursor: pointer; }

        /* App Version */
        .app-footer { text-align: center; margin-top: 40px; }
        .version-text { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--glass-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); }
        .nav-item svg { width: 22px; height: 22px; fill: var(--text-muted); }
        .nav-item span { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: var(--accent-red); }
        .nav-item.active svg { fill: var(--accent-red); }
    </style>
</head>
<body>

    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <h1 class="page-title">Settings</h1>
    </header>

    <div class="settings-group">
        <div class="group-label">Identification</div>
        <div class="setting-card">
            <div class="setting-item">
                <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                <div class="setting-info">
                    <span class="setting-label">Display Name</span>
                    <input type="text" id="set-name" class="input-box" placeholder="Your Name">
                </div>
            </div>
            <div class="setting-item">
                <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>
                <div class="setting-info">
                    <span class="setting-label">Avatar URL</span>
                    <input type="text" id="set-avatar" class="input-box" placeholder="Image link">
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="saveProfile()">Update Profile</button>
    </div>

    <div class="settings-group">
        <div class="group-label">Security & System</div>
        <div class="setting-card">
            <div class="setting-item" onclick="window.location.href='/auth'">
                <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></div>
                <div class="setting-info">
                    <span class="setting-label">Reset Password</span>
                    <span class="setting-desc">Sends a recovery link to your email.</span>
                </div>
            </div>
            <div class="setting-item">
                <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></div>
                <div class="setting-info">
                    <span class="setting-label">System Notifications</span>
                    <span class="setting-desc">Currently managed by Enterprise Engine.</span>
                </div>
            </div>
        </div>
    </div>

    <div class="app-footer">
        <div class="version-text">NE_CORE_ENGINE V2.1.0</div>
    </div>

    <nav class="bottom-nav">
        <a href="/home" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span>
        </a>
        <a href="/tournaments" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg><span>Arena</span>
        </a>
        <a href="/wallet" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg><span>Vault</span>
        </a>
        <a href="/profile" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, updateDoc } from './firebase-config.js';

        let uid = "";
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uid = user.uid;
                const snap = await getDoc(doc(db, "users", uid));
                if(snap.exists()) {
                    document.getElementById('set-name').value = snap.data().name;
                    document.getElementById('set-avatar').value = snap.data().avatar;
                }
            } else { window.location.replace("/auth"); }
        });

        window.saveProfile = async () => {
            const name = document.getElementById('set-name').value;
            const avatar = document.getElementById('set-avatar').value;
            if(!name) return alert("Name required.");

            try {
                await updateDoc(doc(db, "users", uid), { name, avatar });
                alert("Profile synchronized successfully.");
            } catch(e) { alert("Error updating profile."); }
        };
    </script>
</body>
</html>
