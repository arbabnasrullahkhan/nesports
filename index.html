<!DOCTYPE html>
<html lang="en">
<head>
    <!-- [NE SPORTS ENTERPRISE META ENGINE] -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Primary SEO Identity -->
    <title>NE SPORTS | The Ultimate Esports Ecosystem</title>
    <meta name="description" content="NE SPORTS is a premium mobile-first esports ecosystem. Experience high-stakes tournaments with a fully automated engine.">
    <meta name="keywords" content="Esports, PUBG, Free Fire, Tournament Platform, Pakistan Esports, Gaming Business">
    
    <!-- Open Graph (Social Sharing) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="NE SPORTS | Elite Gaming Identity">
    <meta property="og:description" content="Enter the arena of high-end competitive gaming. Automated tournaments and secure payouts.">
    <meta property="og:image" content="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <meta property="og:url" content="https://nesports.vercel.app">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* 
           NE SPORTS GLOBAL CORE CSS
           Theme: Matte Black / Crimson Red / Liquid Glass
        */
        :root {
            --bg-base: #050505;
            --surface-matte: #0A0A0A;
            --accent-crimson: #D32F2F;
            --accent-glow: rgba(211, 47, 47, 0.25);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.4);
            --border-glass: rgba(255, 255, 255, 0.08);
            --font-primary: 'Inter', -apple-system, system-ui, sans-serif;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            font-family: var(--font-primary);
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-base);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tech-Grid Matte Background */
        .boot-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-glass) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-glass) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2; z-index: 1;
        }

        .boot-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
            width: 100%; max-width: 400px;
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Logo Pulse Engine */
        .logo-box {
            position: relative; width: 150px; height: 150px; margin-bottom: 30px;
        }
        .main-logo {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            animation: logoBreath 3s ease-in-out infinite;
            position: relative; z-index: 5;
        }
        .logo-glow {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; height: 180px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(25px); opacity: 0.6; z-index: 1;
            animation: glowCycle 4s infinite alternate;
        }

        /* Text Styling */
        .brand-title {
            font-size: 24px; font-weight: 900; letter-spacing: 10px;
            text-transform: uppercase; color: var(--text-main); margin-bottom: 5px;
        }
        .brand-subtitle {
            font-size: 10px; font-weight: 700; color: var(--accent-crimson);
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px;
        }

        /* Hardware Loader */
        .loader-wrap { width: 220px; position: relative; }
        .progress-track {
            width: 100%; height: 2px; background: rgba(255,255,255,0.05);
            border-radius: 4px; overflow: hidden; margin-bottom: 15px;
        }
        .progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-crimson));
            box-shadow: 0 0 10px var(--accent-crimson);
            animation: loadProgress 2.5s cubic-bezier(0.65, 0.05, 0.36, 1) forwards;
        }

        .terminal-text {
            font-family: 'Courier New', monospace; font-size: 9px;
            color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
        }

        /* Animations */
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes logoBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes glowCycle { from { opacity: 0.3; width: 160px; } to { opacity: 0.7; width: 200px; } }
        @keyframes loadProgress { 0% { width: 0%; } 40% { width: 45%; } 75% { width: 85%; } 100% { width: 100%; } }

        /* Vignette depth */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="boot-bg"></div>
    <div class="vignette"></div>

    <div class="boot-content">
        <div class="logo-box">
            <div class="logo-glow"></div>
            <img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" alt="NE SPORTS" class="main-logo">
        </div>

        <h1 class="brand-title">NE SPORTS</h1>
        <div class="brand-subtitle">ENTERPRISE SYSTEM v7.7</div>

        <div class="loader-wrap">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <div class="terminal-text" id="boot-status">Initializing Core...</div>
        </div>
    </div>

    <!-- [FIREBASE ENGINE MODULE] -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Global Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6",
            measurementId: "G-ELZMHDM7NM"
        };

        // Initialize Core
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusEl = document.getElementById('boot-status');

        // Cinematic Messaging Engine
        const logs = [
            "Establishing Link...",
            "Encrypting Session...",
            "Syncing Vault Data...",
            "Access Granted. Entering Arena."
        ];

        let i = 0;
        const logTimer = setInterval(() => {
            if (i < logs.length) {
                statusEl.innerText = logs[i];
                i++;
            } else { clearInterval(logTimer); }
        }, 550);

        // Session Redirection
        setTimeout(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    try {
                        const userRef = doc(db, "users", user.uid);
                        const userSnap = await getDoc(userRef);
                        
                        if (userSnap.exists()) {
                            window.location.replace("/home"); // Vercel Clean URL
                        } else {
                            window.location.replace("/auth");
                        }
                    } catch (e) {
                        window.location.replace("/auth");
                    }
                } else {
                    window.location.replace("/auth");
                }
            });
        }, 2600); // Sync with CSS progress animation
    </script>
</body>
</html>
