<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Loading</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg-base: #050505;
            --surface: #121212;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-red: #D32F2F; /* Premium Crimson */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cinematicFadeIn 1.5s ease-out forwards;
            opacity: 0;
        }

        .brand-logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
        }

        .brand-title {
            color: var(--text-main);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .loader-wrapper {
            margin-top: 40px;
            width: 150px;
        }

        .progress-track {
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: var(--accent-red);
            animation: fillProgress 2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        .system-status {
            margin-top: 15px;
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulseText 1.5s infinite;
        }

        /* Animations */
        @keyframes cinematicFadeIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" alt="NE SPORTS" class="brand-logo">
        <div class="brand-title">NE SPORTS</div>
        
        <div class="loader-wrapper">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <div class="system-status" id="status-text">INITIALIZING SYSTEM</div>
        </div>
    </div>

    <!-- Importing Firebase Engine -->
    <script type="module">
        import { auth, onAuthStateChanged } from './firebase-config.js';

        // Update status text dynamically
        setTimeout(() => document.getElementById('status-text').innerText = "AUTHENTICATING...", 1000);

        // 2.2 Seconds wait for animation to complete
        setTimeout(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.location.replace("home.html");
                } else {
                    window.location.replace("auth.html");
                }
            });
        }, 2200);
    </script>
</body>
</html>
