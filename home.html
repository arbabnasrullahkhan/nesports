<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Home Arena</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg: #0A0A0A;
            --cyan: #00D4FF;
            --purple: #7B61FF;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: 'SF Pro Display', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            padding-bottom: 100px; /* Space for Bottom Nav */
        }

        /* Dynamic Island Header */
        .header-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 60px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .user-pill { display: flex; align-items: center; gap: 10px; }
        .user-pill img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--cyan); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 13px; font-weight: 600; }
        .user-level { font-size: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }

        .wallet-pill {
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--glass-border);
        }
        .wallet-pill span { font-size: 14px; font-weight: 700; color: #fff; }

        /* Hero Banner */
        .hero-section {
            margin-top: 100px;
            padding: 0 20px;
        }
        .hero-card {
            width: 100%;
            height: 180px;
            background: linear-gradient(45deg, #7B61FF, #00D4FF);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 25px;
        }
        .hero-card::after {
            content: '';
            position: absolute;
            right: -20px;
            bottom: -20px;
            width: 150px;
            height: 150px;
            background: url('https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png') no-repeat center;
            background-size: contain;
            opacity: 0.2;
            filter: grayscale(1);
        }
        .hero-content h1 { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .hero-content p { font-size: 13px; opacity: 0.9; }

        /* Tournament Section */
        .section-title {
            padding: 25px 20px 15px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title span { color: var(--cyan); font-size: 12px; }

        .tournament-grid {
            padding: 0 20px;
            display: grid;
            gap: 15px;
        }

        .t-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            position: relative;
            transition: 0.3s;
        }
        .t-card:active { transform: scale(0.97); }
        .t-poster {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
        }
        .t-details { flex: 1; }
        .t-details h3 { font-size: 16px; margin-bottom: 5px; }
        .t-meta { display: flex; gap: 10px; font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
        
        .t-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prize-tag { color: #FFD700; font-weight: 700; font-size: 14px; }
        .join-btn {
            background: white;
            color: black;
            padding: 6px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            border: none;
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 70px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; transition: 0.3s; }
        .nav-item.active { color: var(--cyan); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
        .nav-item.active svg { fill: var(--cyan); filter: drop-shadow(0 0 5px var(--cyan)); }

    </style>
</head>
<body>

    <!-- Dynamic Island -->
    <div class="header-island">
        <div class="user-pill" onclick="window.location.href='profile.html'">
            <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" alt="User">
            <div class="user-info">
                <span class="user-name" id="user-name">Loading...</span>
                <span class="user-level" id="user-level">BRONZE</span>
            </div>
        </div>
        <div class="wallet-pill">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
            <span id="user-balance">0</span>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero-section">
        <div class="hero-card">
            <div class="hero-content">
                <h1>PUBG MOBILE</h1>
                <p>Mega Tournament • 10,000 PKR Prize</p>
                <p style="margin-top: 10px; font-weight: 700;">LIVE NOW</p>
            </div>
        </div>
    </div>

    <!-- Tournaments -->
    <div class="section-title">
        Active Tournaments
        <span>View All</span>
    </div>

    <div class="tournament-grid" id="tournament-list">
        <!-- Skeleton / Placeholder -->
        <div class="t-card">
            <div style="width: 80px; height: 80px; background: var(--glass); border-radius: 15px;"></div>
            <div class="t-details">
                <div style="width: 60%; height: 15px; background: var(--glass); margin-bottom: 10px;"></div>
                <div style="width: 40%; height: 10px; background: var(--glass);"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="nav-bar">
        <a href="home.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            HOME
        </a>
        <a href="tournaments.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>
            MATCHES
        </a>
        <a href="wallet.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            WALLET
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            PROFILE
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6",
            measurementId: "G-ELZMHDM7NM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('user-name').innerText = data.name;
                    document.getElementById('user-balance').innerText = data.wallet + " PKR";
                    document.getElementById('user-level').innerText = data.level;
                    document.getElementById('user-avatar').src = data.avatar;
                }
                loadTournaments();
            } else {
                window.location.href = "auth.html";
            }
        });

        async function loadTournaments() {
            const tList = document.getElementById('tournament-list');
            const q = query(collection(db, "tournaments"), where("status", "==", "open"));
            const querySnapshot = await getDocs(q);
            
            tList.innerHTML = ""; // Clear loader

            if (querySnapshot.empty) {
                tList.innerHTML = "<p style='text-align:center; opacity:0.5;'>No active tournaments found.</p>";
            }

            querySnapshot.forEach((doc) => {
                const t = doc.data();
                tList.innerHTML += `
                    <div class="t-card">
                        <img src="${t.image || 'https://via.placeholder.com/80'}" class="t-poster">
                        <div class="t-details">
                            <h3>${t.title}</h3>
                            <div class="t-meta">
                                <span>🎮 ${t.game}</span>
                                <span>👥 ${t.slotsRemaining}/${t.totalSlots}</span>
                            </div>
                            <div class="t-footer">
                                <span class="prize-tag">PKR ${t.prize}</span>
                                <button class="join-btn" onclick="joinMatch('${doc.id}', ${t.entryFee})">JOIN</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.joinMatch = (id, fee) => {
            // Logic for joining will go here
            alert("Joining Tournament: " + id + " | Fee: " + fee);
        };
    </script>
</body>
</html>
