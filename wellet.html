<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Wallet</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg: #0A0A0A;
            --cyan: #00D4FF;
            --purple: #7B61FF;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            padding: 20px;
            padding-bottom: 100px;
            background: radial-gradient(circle at bottom right, rgba(0, 212, 255, 0.1), transparent);
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.2), rgba(0, 212, 255, 0.1));
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .balance-card h2 { font-size: 14px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }
        .balance-amount { font-size: 42px; font-weight: 800; margin: 10px 0; color: #fff; }
        .balance-amount span { font-size: 18px; color: var(--cyan); }

        /* Action Tabs */
        .wallet-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .action-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .action-btn.active { background: white; color: black; }

        /* Forms Section */
        .form-container {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .form-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 8px; opacity: 0.7; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--cyan);
            color: black;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }

        /* VIP Tiers */
        .vip-section { margin-top: 40px; }
        .vip-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .vip-card {
            min-width: 140px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }
        .vip-card.silver { background: linear-gradient(135deg, #bdc3c7, #2c3e50); }
        .vip-card.gold { background: linear-gradient(135deg, #f1c40f, #f39c12); color: black; }
        .vip-card.diamond { background: linear-gradient(135deg, #00d4ff, #7b61ff); }

        /* Transaction List */
        .history-section { margin-top: 40px; }
        .history-item {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--purple);
        }
        .status-pending { color: #f1c40f; font-size: 10px; font-weight: bold; }
        .status-success { color: #2ecc71; font-size: 10px; font-weight: bold; }

        /* Navigation Bar (Same as Home) */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px); border-radius: 25px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--cyan); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div class="balance-card">
        <h2>Total Balance</h2>
        <div class="balance-amount"><span id="curr">PKR</span> <span id="user-balance">0</span></div>
        <p style="font-size: 12px; opacity: 0.5;">Secure Esports Wallet</p>
    </div>

    <div class="wallet-actions">
        <div class="action-btn active" onclick="showForm('deposit', this)">Deposit</div>
        <div class="action-btn" onclick="showForm('withdraw', this)">Withdraw</div>
    </div>

    <!-- Deposit Form -->
    <div id="deposit-form" class="form-container active">
        <div class="input-group">
            <label>Payment Method</label>
            <select id="dep-method">
                <option value="JazzCash">JazzCash (03xx-xxxxxxx)</option>
                <option value="EasyPaisa">EasyPaisa (03xx-xxxxxxx)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Amount (PKR)</label>
            <input type="number" id="dep-amount" placeholder="Min: 100">
        </div>
        <div class="input-group">
            <label>Transaction ID (TID)</label>
            <input type="text" id="dep-tid" placeholder="Enter 11-digit TID">
        </div>
        <button class="submit-btn" onclick="requestDeposit()">Submit Deposit</button>
    </div>

    <!-- Withdraw Form -->
    <div id="withdraw-form" class="form-container">
        <div class="input-group">
            <label>Receiver Account</label>
            <input type="text" id="wit-account" placeholder="Account Number">
        </div>
        <div class="input-group">
            <label>Amount (PKR)</label>
            <input type="number" id="wit-amount" placeholder="Min: 500">
        </div>
        <button class="submit-btn" style="background: var(--purple);" onclick="requestWithdraw()">Request Payout</button>
    </div>

    <!-- VIP Section -->
    <div class="vip-section">
        <h3 style="margin-bottom: 15px;">VIP Tiers</h3>
        <div class="vip-scroll">
            <div class="vip-card silver"><h4>SILVER</h4><p>5% Bonus</p></div>
            <div class="vip-card gold"><h4>GOLD</h4><p>10% Bonus</p></div>
            <div class="vip-card diamond"><h4>DIAMOND</h4><p>20% Bonus</p></div>
        </div>
    </div>

    <!-- History -->
    <div class="history-section">
        <h3 style="margin-bottom: 15px;">Recent Transactions</h3>
        <div id="transaction-history">
            <!-- Dynamic Data -->
        </div>
    </div>

    <nav class="nav-bar">
        <a href="home.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>HOME
        </a>
        <a href="tournaments.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg>MATCHES
        </a>
        <a href="wallet.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>WALLET
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>PROFILE
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7",
            storageBucket: "nesports7.firebasestorage.app",
            messagingSenderId: "414629589331",
            appId: "1:414629589331:web:2a30069688008d17d371a6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadWalletData();
                loadHistory();
            } else {
                window.location.href = "auth.html";
            }
        });

        window.showForm = (type, btn) => {
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type + '-form').classList.add('active');
            btn.classList.add('active');
        };

        async function loadWalletData() {
            const docRef = doc(db, "users", currentUser.uid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                document.getElementById('user-balance').innerText = snap.data().wallet;
            }
        }

        window.requestDeposit = async () => {
            const amount = document.getElementById('dep-amount').value;
            const tid = document.getElementById('dep-tid').value;
            const method = document.getElementById('dep-method').value;

            if (amount < 100 || !tid) return alert("Invalid details");

            await addDoc(collection(db, "transactions"), {
                uid: currentUser.uid,
                type: "Deposit",
                amount: parseInt(amount),
                method: method,
                tid: tid,
                status: "pending",
                timestamp: new Date()
            });
            alert("Deposit Request Sent!");
            location.reload();
        };

        window.requestWithdraw = async () => {
            const amount = document.getElementById('wit-amount').value;
            const acc = document.getElementById('wit-account').value;

            if (amount < 500 || !acc) return alert("Invalid details");

            await addDoc(collection(db, "transactions"), {
                uid: currentUser.uid,
                type: "Withdraw",
                amount: parseInt(amount),
                account: acc,
                status: "pending",
                timestamp: new Date()
            });
            alert("Withdrawal Request Sent!");
            location.reload();
        };

        async function loadHistory() {
            const histDiv = document.getElementById('transaction-history');
            const q = query(collection(db, "transactions"), where("uid", "==", currentUser.uid), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            
            histDiv.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                histDiv.innerHTML += `
                    <div class="history-item">
                        <div>
                            <div style="font-weight:bold">${data.type}</div>
                            <div style="font-size:11px; opacity:0.6">${data.method || 'Bank'}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:bold">PKR ${data.amount}</div>
                            <div class="status-${data.status}">${data.status.toUpperCase()}</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
