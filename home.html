<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Command Center | NE SPORTS</title>
    <meta name="theme-color" content="#050505">
    
    <!-- Clean Routing Icon -->
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* [NE SPORTS HOME MASTER STYLES] */
        :root {
            --bg-base: #050505;
            --surface: #0E0E0E;
            --surface-elevated: #161616;
            --accent: #D32F2F;
            --accent-glow: rgba(211, 47, 47, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Shared Mount Points */
        #header-mount { width: 100%; height: 80px; position: fixed; top: 0; z-index: 5000; }
        #navigation-mount { width: 100%; position: fixed; bottom: 0; z-index: 4000; }

        /* [1. HERO SLIDER SYSTEM] */
        .hero-viewport {
            width: 100%; height: 450px; position: relative; overflow: hidden;
            background: #000;
        }
        .hero-track {
            display: flex; width: 200%; height: 100%;
            transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .hero-slide {
            width: 50%; height: 100%; position: relative;
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 40px 20px 80px;
        }
        .hero-slide::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, var(--bg-base) 10%, transparent 80%);
        }
        .hero-content { position: relative; z-index: 10; max-width: 300px; }
        .hero-tag { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .hero-title { font-size: 34px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 15px; }
        .hero-btn {
            background: var(--text-main); color: #000; border: none; padding: 14px 28px;
            border-radius: 12px; font-size: 12px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* [2. STATISTICS RIBBON] */
        .stats-ribbon {
            display: grid; grid-template-columns: repeat(3, 1fr);
            background: var(--surface); border: 1px solid var(--border);
            margin: -30px 20px 30px; border-radius: 20px; overflow: hidden;
            position: relative; z-index: 20;
        }
        .stat-box { padding: 20px 10px; text-align: center; border-right: 1px solid var(--border); }
        .stat-box:last-child { border-right: none; }
        .stat-val { font-size: 16px; font-weight: 900; display: block; margin-bottom: 4px; }
        .stat-lbl { font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* [3. TRUST SCORE ENGINE] */
        .trust-section { padding: 0 20px 30px; }
        .trust-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 20px;
        }
        .trust-meter { width: 60px; height: 60px; position: relative; }
        .trust-info { flex: 1; }
        .trust-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .trust-status { font-size: 16px; font-weight: 900; color: #4CAF50; margin-top: 2px; }
        .trust-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .trust-bar-fill { height: 100%; background: #4CAF50; border-radius: 2px; width: 0%; transition: 1.5s ease-out; }

        /* [4. GLOBAL SECTION LAYOUT] */
        .section-wrap { padding: 0 20px 40px; }
        .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; }
        .section-link { font-size: 11px; color: var(--accent); font-weight: 700; text-decoration: none; }

        /* [5. TOURNAMENT CARDS] */
        .match-list { display: flex; flex-direction: column; gap: 15px; }
        .t-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; display: flex; gap: 15px;
            position: relative; transition: 0.3s;
        }
        .t-card:active { transform: scale(0.97); }
        .t-img { width: 85px; height: 85px; border-radius: 14px; object-fit: cover; }
        .t-details { flex: 1; position: relative; }
        .t-title { font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .t-meta { display: flex; gap: 10px; font-size: 10px; color: var(--text-dim); margin-bottom: 12px; }
        .t-meta span { display: flex; align-items: center; gap: 4px; }
        .t-meta svg { width: 12px; height: 12px; fill: var(--text-dim); }
        .t-prize { font-size: 15px; font-weight: 900; color: var(--accent); }
        .t-fixed-rule { font-size: 8px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        
        .live-pulse {
            position: absolute; top: 15px; right: 15px; width: 8px; height: 8px;
            background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        /* [6. LEADERBOARD PREVIEW] */
        .home-ranks { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .rank-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .rank-row:last-child { border-bottom: none; }
        .r-pos { width: 25px; font-size: 12px; font-weight: 900; color: var(--text-dim); }
        .r-avatar { width: 32px; height: 32px; border-radius: 50%; margin: 0 12px; border: 1px solid var(--border); }
        .r-name { flex: 1; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .r-tag { font-size: 8px; font-weight: 900; color: var(--text-dim); padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; }

        /* [7. SPONSORS] */
        .sponsor-scroll { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .sponsor-scroll::-webkit-scrollbar { display: none; }
        .s-card {
            min-width: 130px; height: 70px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .s-logo { max-width: 70%; filter: grayscale(1) brightness(2); opacity: 0.6; }

        /* Quick Actions */
        .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px 40px; }
        .qa-item { text-align: center; text-decoration: none; }
        .qa-icon {
            width: 50px; height: 50px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center;
        }
        .qa-icon svg { width: 24px; height: 24px; fill: var(--text-dim); }
        .qa-lbl { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- SHARED MODULE MOUNTS -->
    <div id="loader-mount"></div>
    <div id="header-mount"></div>

    <!-- [MAIN CONTENT VIEW] -->
    <main id="main-dashboard" style="opacity: 0; transition: opacity 0.8s;">
        
        <!-- 1. HERO SLIDER -->
        <section class="hero-viewport">
            <div class="hero-track" id="hero-slider">
                <!-- PUBG Slide -->
                <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200');">
                    <div class="hero-content">
                        <div class="hero-tag">Deployment Active</div>
                        <h1 class="hero-title">PUBG Mobile Arena</h1>
                        <button class="hero-btn" onclick="window.location.href='/arena?game=PUBG'">
                            <span>Join Arena</span>
                            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                        </button>
                    </div>
                </div>
                <!-- Free Fire Slide -->
                <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&w=1200');">
                    <div class="hero-content">
                        <div class="hero-tag">Elite Circuit</div>
                        <h1 class="hero-title">Free Fire Evolution</h1>
                        <button class="hero-btn" onclick="window.location.href='/arena?game=FreeFire'">
                            <span>Join Arena</span>
                            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. STATS -->
        <section class="stats-ribbon">
            <div class="stat-box"><span class="stat-val" id="st-players">---</span><span class="stat-lbl">Operatives</span></div>
            <div class="stat-box"><span class="stat-val" id="st-prizes">---</span><span class="stat-lbl">Distributed</span></div>
            <div class="stat-box"><span class="stat-val">Online</span><span class="stat-lbl">System State</span></div>
        </section>

    
        <!-- 5. LIVE TOURNAMENTS -->
        <section class="section-wrap">
            <div class="section-head"><h2 class="section-title">Live Deployments</h2><a href="/arena" class="section-link">View Arena</a></div>
            <div class="match-list" id="live-matches">
                <!-- Sync with Firestore -->
            </div>
        </section>
    <!-- 3. TRUST SCORE -->
        <section class="trust-section">
            <div class="trust-card">
                <div class="trust-meter">
                    <svg viewBox="0 0 36 36" style="width:100%; height:100%;">
                        <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
                        <path id="trust-circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="0, 100"/>
                    </svg>
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; font-weight:900;" id="trust-pct">0%</div>
                </div>
                <div class="trust-info">
                    <span class="trust-label">Operative Reliability</span>
                    <div class="trust-status" id="trust-rank">Analyzing Identity...</div>
                    <div class="trust-bar-bg"><div class="trust-bar-fill" id="trust-fill"></div></div>
                </div>
            </div>
        </section>

        <!-- 4. QUICK ACTIONS -->
        <section class="quick-actions">
            <a href="/arena" class="qa-item"><div class="qa-icon"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg></div><span class="qa-lbl">Arena</span></a>
            <a href="/wallet" class="qa-item"><div class="qa-icon"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></div><span class="qa-lbl">Vault</span></a>
            <a href="/teams" class="qa-item"><div class="qa-icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div><span class="qa-lbl">Squad</span></a>
            <a href="/more" class="qa-item"><div class="qa-icon"><svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div><span class="qa-lbl">More</span></a>
        </section>

        <!-- 6. LEADERBOARD PREVIEW -->
        <section class="section-wrap">
            <div class="section-head"><h2 class="section-title">Mixed Rankings</h2><a href="/leaderboard" class="section-link">Full Standings</a></div>
            <div class="home-ranks" id="top-ranks">
                <!-- Sync with Firestore -->
            </div>
        </section>

        <!-- 7. SPONSORS -->
        <section class="section-wrap" style="padding-bottom: 120px;">
            <div class="section-head"><h2 class="section-title">Official Sponsors</h2></div>
            <div class="sponsor-scroll" id="sponsor-list">
                <div class="s-card"><img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" class="s-logo"></div>
                <div class="s-card"><img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" class="s-logo"></div>
                <div class="s-card"><img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" class="s-logo"></div>
            </div>
        </section>

        <div id="footer-mount"></div>
    </main>

    <div id="navigation-mount"></div>

    <!-- [CORE DASHBOARD LOGIC ENGINE] -->
    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, collection, query, where, limit, getDocs, orderBy, onSnapshot } from './firebase-config.js';

        // 1. Component Mounting Utility
        async function mount(id, file) {
            try {
                const res = await fetch(file);
                document.getElementById(id).innerHTML = await res.text();
                // Execute module scripts manually
                const scripts = document.getElementById(id).querySelectorAll('script');
                scripts.forEach(s => {
                    const ns = document.createElement('script');
                    ns.type = 'module';
                    ns.textContent = s.textContent;
                    document.body.appendChild(ns);
                });
            } catch(e) { console.error("Mount Fail:", file); }
        }

        // 2. Initialize App
        window.addEventListener('DOMContentLoaded', async () => {
            await mount('loader-mount', '/loader.html');
            await mount('header-mount', '/header.html');
            await mount('navigation-mount', '/navigation.html');
            await mount('footer-mount', '/footer.html');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('main-dashboard').style.opacity = '1';
                    initDashboard(user.uid);
                    startHeroSlider();
                } else { window.location.replace('/auth'); }
            });
        });

        // 3. Dashboard Core Data
        async function initDashboard(uid) {
            // A. Trust Score calculation
            const uSnap = await getDoc(doc(db, "users", uid));
            if(uSnap.exists()) {
                const u = uSnap.data();
                const score = u.trustScore || 85; // Default 85
                document.getElementById('trust-pct').innerText = score + "%";
                document.getElementById('trust-circle').style.strokeDasharray = `${score}, 100`;
                document.getElementById('trust-fill').style.width = score + "%";
                document.getElementById('trust-rank').innerText = score > 90 ? "Elite Operative" : "Verified Operative";
            }

            // B. Platform Stats
            onSnapshot(doc(db, "system_stats", "global"), (snap) => {
                if(snap.exists()) {
                    document.getElementById('st-players').innerText = snap.data().total_users.toLocaleString() + "+";
                    document.getElementById('st-prizes').innerText = "PKR " + (snap.data().total_prizes / 1000).toFixed(0) + "K";
                }
            });

            // C. Live Matches (Real-time)
            const qLive = query(collection(db, "tournaments"), where("status", "==", "live"), limit(3));
            onSnapshot(qLive, (snapshot) => {
                const list = document.getElementById('live-matches');
                list.innerHTML = "";
                if(snapshot.empty) list.innerHTML = `<p style="text-align:center; font-size:11px; color:var(--text-dim);">NO LIVE MATCHES AT THIS INTERVAL</p>`;
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    list.innerHTML += `
                        <div class="t-card" onclick="window.location.href='/arena?id=${docSnap.id}'">
                            <div class="live-pulse"></div>
                            <img src="${t.image}" class="t-img">
                            <div class="t-details">
                                <h3 class="t-title">${t.title}</h3>
                                <div class="t-meta">
                                    <span>🎮 ${t.game}</span>
                                    <span>👥 ${t.joined}/${t.totalSlots}</span>
                                </div>
                                <div class="t-prize">PRIZE: PKR ${t.prizePool}</div>
                                <div class="t-fixed-rule">PROTOCOL: MISS MATCH = NO REFUND</div>
                            </div>
                        </div>
                    `;
                });
            });

            // D. Top Ranks
            const qRank = query(collection(db, "users"), orderBy("xp", "desc"), limit(5));
            const rSnap = await getDocs(qRank);
            const rankBox = document.getElementById('top-ranks');
            rankBox.innerHTML = "";
            let i = 1;
            rSnap.forEach(docSnap => {
                const r = docSnap.data();
                rankBox.innerHTML += `
                    <div class="rank-row">
                        <span class="r-pos">#${i++}</span>
                        <img src="${r.avatar}" class="r-avatar">
                        <span class="r-name">${r.name}</span>
                        <span class="r-tag">${r.favGame || 'PRO'}</span>
                    </div>
                `;
            });
        }

        // 4. Hero Slider Engine
        function startHeroSlider() {
            const track = document.getElementById('hero-slider');
            let slide = 0;
            setInterval(() => {
                slide = slide === 0 ? 1 : 0;
                track.style.transform = `translateX(-${slide * 50}%)`;
            }, 3000);
        }

    </script>
</body>
</html>
