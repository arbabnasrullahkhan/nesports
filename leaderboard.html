<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard | NE SPORTS Enterprise</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        :root {
            --bg-base: #050505;
            --surface-matte: #0A0A0A;
            --surface-glass: rgba(18, 18, 18, 0.85);
            --accent-crimson: #D32F2F;
            --accent-gold: #D4AF37;
            --accent-silver: #C0C0C0;
            --accent-bronze: #CD7F32;
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Shared Mounts */
        #header-mount { width: 100%; height: 80px; position: fixed; top: 0; z-index: 5000; }
        #navigation-mount { width: 100%; position: fixed; bottom: 0; z-index: 4000; }

        .leaderboard-content { padding: 90px 20px 120px; }

        /* [1. THE PODIUM] */
        .podium-section {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 10px; margin-bottom: 40px; padding-top: 20px;
        }

        .podium-card {
            background: var(--surface-matte); border: 1px solid var(--border-glass);
            border-radius: 20px; text-align: center; position: relative;
            display: flex; flex-direction: column; align-items: center; padding: 15px 10px;
        }

        .rank-2 { height: 160px; width: 30%; order: 1; border-color: var(--accent-silver); }
        .rank-1 { height: 190px; width: 35%; order: 2; border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); }
        .rank-3 { height: 140px; width: 30%; order:  order: 3; border-color: var(--accent-bronze); }

        .podium-avatar {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--border-glass);
            margin-bottom: 10px; background: #111;
        }
        .rank-1 .podium-avatar { width: 70px; height: 70px; border-color: var(--accent-gold); }

        .podium-name { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; max-width: 100%; overflow: hidden; }
        .podium-xp { font-size: 10px; color: var(--accent-crimson); font-weight: 900; }

        .crown-svg { width: 24px; height: 24px; position: absolute; top: -15px; }

        /* [2. HALL OF FAME] */
        .section-label { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: var(--accent-crimson); display: flex; align-items: center; gap: 10px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border-glass); }

        .hof-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px;
        }

        .hof-card {
            background: var(--surface-matte); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 20px; position: relative; overflow: hidden;
        }

        .hof-icon { width: 20px; height: 20px; fill: var(--text-dim); margin-bottom: 10px; }
        .hof-title { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 5px; display: block; }
        .hof-val { font-size: 14px; font-weight: 800; color: #fff; }
        .hof-glow { position: absolute; bottom: -20px; right: -20px; width: 60px; height: 60px; background: var(--accent-crimson); filter: blur(40px); opacity: 0.1; }

        /* [3. GLOBAL RANKINGS LIST] */
        .rankings-table {
            background: var(--surface-matte); border: 1px solid var(--border-glass);
            border-radius: 20px; overflow: hidden;
        }

        .rank-row {
            display: flex; align-items: center; padding: 15px;
            border-bottom: 1px solid var(--border-glass); transition: 0.3s;
        }
        .rank-row:last-child { border-bottom: none; }
        .rank-row:active { background: rgba(255,255,255,0.02); }

        .r-position { width: 30px; font-size: 14px; font-weight: 900; color: var(--text-dim); }
        .r-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-glass); margin: 0 15px; }
        
        .r-info { flex: 1; }
        .r-name { font-size: 13px; font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        /* Game Tag System */
        .game-tag {
            font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tag-pubg { background: rgba(255, 193, 7, 0.1); color: #FFC107; border: 1px solid #FFC107; }
        .tag-ff { background: rgba(33, 150, 243, 0.1); color: #2196F3; border: 1px solid #2196F3; }

        .r-score { text-align: right; }
        .r-xp { font-size: 14px; font-weight: 900; color: var(--accent-crimson); }
        .r-win-rate { font-size: 9px; color: var(--text-dim); display: block; }

    </style>
</head>
<body>

    <div id="loader-mount"></div>
    <div id="header-mount"></div>

    <main class="leaderboard-content" id="main-content" style="opacity: 0; transition: opacity 0.5s;">
        
        <!-- [1. THE PODIUM] -->
        <section class="podium-section" id="global-podium">
            <!-- Silver (2nd) -->
            <div class="podium-card rank-2">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Shadow" class="podium-avatar" alt="2nd">
                <span class="podium-name" id="p2-name">---</span>
                <span class="podium-xp" id="p2-xp">0 XP</span>
            </div>
            <!-- Gold (1st) -->
            <div class="podium-card rank-1">
                <svg class="crown-svg" viewBox="0 0 24 24" fill="#D4AF37"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .55-.45 1-1 1H6c-.55 0-1-.45-1-1v-1h14v1z"/></svg>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=King" class="podium-avatar" alt="1st">
                <span class="podium-name" id="p1-name">---</span>
                <span class="podium-xp" id="p1-xp">0 XP</span>
            </div>
            <!-- Bronze (3rd) -->
            <div class="podium-card rank-3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Storm" class="podium-avatar" alt="3rd">
                <span class="podium-name" id="p3-name">---</span>
                <span class="podium-xp" id="p3-xp">0 XP</span>
            </div>
        </section>

        <!-- [2. HALL OF FAME] -->
        <div class="section-label">Hall of Fame</div>
        <section class="hof-grid">
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span class="hof-title">Elite Ambassador</span>
                <div class="hof-val" id="hof-ambassador">LOADING...</div>
                <div class="hof-glow"></div>
            </div>
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.83L19.17 19H4.83L12 5.83z"/></svg>
                <span class="hof-title">Top Killer</span>
                <div class="hof-val" id="hof-killer">LOADING...</div>
                <div class="hof-glow"></div>
            </div>
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <span class="hof-title">Biggest Prize</span>
                <div class="hof-val" id="hof-prize">PKR 0</div>
                <div class="hof-glow"></div>
            </div>
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                <span class="hof-title">Elite Clan</span>
                <div class="hof-val" id="hof-clan">---</div>
                <div class="hof-glow"></div>
            </div>
        </section>

        <!-- [3. GLOBAL RANKINGS] -->
        <div class="section-label">Global Rankings (Mixed)</div>
        <div class="rankings-table" id="rank-list">
            <!-- Firestore Dynamic Data -->
            <p style="text-align: center; padding: 40px; color: var(--text-dim); font-size: 11px; letter-spacing: 2px;">SYNCING GLOBAL LEDGER...</p>
        </div>

        <div id="footer-mount"></div>
    </main>

    <div id="navigation-mount"></div>

    <!-- [LEADERBOARD ENGINE] -->
    <script type="module">
        import { auth, db, onAuthStateChanged, collection, query, orderBy, limit, getDocs, onSnapshot, doc, getDoc } from './firebase-config.js';

        // 1. Component Mounting
        async function loadComponent(id, file) {
            const res = await fetch(file);
            document.getElementById(id).innerHTML = await res.text();
            const scripts = document.getElementById(id).querySelectorAll('script');
            scripts.forEach(s => {
                const ns = document.createElement('script');
                ns.type = 'module';
                ns.textContent = s.textContent;
                document.body.appendChild(ns);
            });
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('loader-mount', '/loader.html');
            await loadComponent('header-mount', '/header.html');
            await loadComponent('navigation-mount', '/navigation.html');
            await loadComponent('footer-mount', '/footer.html');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('main-content').style.opacity = '1';
                    initLeaderboardSync();
                    loadHallOfFame();
                } else { window.location.replace('/auth'); }
            });
        });

        // 2. Real-time Leaderboard Logic
        function initLeaderboardSync() {
            const list = document.getElementById('rank-list');
            const q = query(collection(db, "users"), orderBy("xp", "desc"), limit(50));
            
            onSnapshot(q, (snapshot) => {
                const players = [];
                snapshot.forEach(doc => players.push({ id: doc.id, ...doc.data() }));

                // Update Podium (1-3)
                if (players.length >= 3) {
                    updatePodium(players[0], players[1], players[2]);
                }

                // Update List (4-50)
                list.innerHTML = "";
                players.forEach((p, index) => {
                    const pos = index + 1;
                    const gameTag = p.primaryGame === 'PUBG' ? 'tag-pubg' : 'tag-ff';
                    
                    list.innerHTML += `
                        <div class="rank-row">
                            <span class="r-position">#${pos}</span>
                            <img src="${p.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+p.name}" class="r-avatar">
                            <div class="r-info">
                                <span class="r-name">${p.name}</span>
                                <span class="game-tag ${gameTag}">${p.primaryGame || 'ELITE'}</span>
                            </div>
                            <div class="r-score">
                                <span class="r-xp">${p.xp || 0} XP</span>
                                <span class="r-win-rate">${p.winRate || '0'}% WR</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function updatePodium(p1, p2, p3) {
            document.getElementById('p1-name').innerText = p1.name;
            document.getElementById('p1-xp').innerText = (p1.xp || 0) + " XP";
            document.querySelectorAll('.rank-1 img')[0].src = p1.avatar;

            document.getElementById('p2-name').innerText = p2.name;
            document.getElementById('p2-xp').innerText = (p2.xp || 0) + " XP";
            document.querySelectorAll('.rank-2 img')[0].src = p2.avatar;

            document.getElementById('p3-name').innerText = p3.name;
            document.getElementById('p3-xp').innerText = (p3.xp || 0) + " XP";
            document.querySelectorAll('.rank-3 img')[0].src = p3.avatar;
        }

        // 3. Hall of Fame Data
        async function loadHallOfFame() {
            // This fetches specific highlights from a managed collection
            const hofRef = doc(db, "system_stats", "hall_of_fame");
            const hofSnap = await getDoc(hofRef);

            if (hofSnap.exists()) {
                const data = hofSnap.data();
                document.getElementById('hof-ambassador').innerText = data.top_ambassador || 'TBA';
                document.getElementById('hof-killer').innerText = data.top_killer || 'TBA';
                document.getElementById('hof-prize').innerText = `PKR ${data.max_prize?.toLocaleString() || 0}`;
                document.getElementById('hof-clan').innerText = data.top_clan || 'UNCLAIMED';
            }
        }

    </script>
</body>
</html>
