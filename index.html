<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NE SPORTS | Loading...</title>
    <link rel="icon" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <style>
        :root {
            --bg: #0A0A0A;
            --cyan: #00D4FF;
            --purple: #7B61FF;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            position: relative;
        }

        .logo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            z-index: 2;
        }

        .logo {
            width: 100%;
            filter: drop-shadow(0 0 20px var(--cyan));
            animation: pulse 2s infinite ease-in-out;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
            opacity: 0.3;
            filter: blur(30px);
            z-index: 1;
        }

        .loader-bar {
            width: 120px;
            height: 4px;
            background: var(--glass);
            margin-top: 30px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            animation: load 2.5s forwards cubic-bezier(0.42, 0, 0.58, 1);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .powered-by {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" alt="NE SPORTS" class="logo">
        </div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div class="powered-by">Powered by Nexra</div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3DCiKSeFMpUAmz_iiuhnH-N3SgV-pIXU",
            authDomain: "nesports7.firebaseapp.com",
            projectId: "nesports7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 2.5 Seconds wait for animation then redirect
        setTimeout(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.location.href = "home.html";
                } else {
                    window.location.href = "auth.html";
                }
            });
        }, 2500);
    </script>
</body>
</html>
