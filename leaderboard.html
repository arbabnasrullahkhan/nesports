<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hall of Fame | NE SPORTS</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        :root {
            --bg-base: #050505;
            --surface-matte: #0A0A0A;
            --surface-elevated: #151515;
            --accent-crimson: #D32F2F;
            --accent-gold: #D4AF37;
            --accent-silver: #C0C0C0;
            --accent-bronze: #CD7F32;
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Shared Component Mounts */
        #header-mount { width: 100%; height: 80px; position: fixed; top: 0; z-index: 5000; }
        #navigation-mount { width: 100%; position: fixed; bottom: 0; z-index: 4000; }

        /* [1. LEADERSHIP PODIUM] */
        .podium-section {
            padding: 120px 20px 40px;
            background: linear-gradient(180deg, rgba(211, 47, 47, 0.05) 0%, var(--bg-base) 100%);
            display: flex; align-items: flex-end; justify-content: center; gap: 10px;
        }

        .podium-item {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            flex: 1; transition: 0.5s ease;
        }

        .p-avatar-wrap { position: relative; margin-bottom: 12px; }
        .p-avatar {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border-glass);
            background: var(--surface-matte); object-fit: cover;
        }
        .p-rank-tag {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            padding: 2px 10px; border-radius: 10px; font-size: 9px; font-weight: 900; color: #000;
        }

        /* Rank Specifics */
        .rank-1 { transform: scale(1.15); z-index: 10; }
        .rank-1 .p-avatar { width: 85px; height: 85px; border-color: var(--accent-gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); }
        .rank-1 .p-rank-tag { background: var(--accent-gold); }
        
        .rank-2 .p-avatar { border-color: var(--accent-silver); }
        .rank-2 .p-rank-tag { background: var(--accent-silver); }

        .rank-3 .p-avatar { border-color: var(--accent-bronze); }
        .rank-3 .p-rank-tag { background: var(--accent-bronze); }

        .p-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; max-width: 80px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 5px;}
        .p-meta { font-size: 9px; color: var(--accent-crimson); font-weight: 700; margin-top: 2px; }

        /* [2. SEARCH & FILTERS] */
        .leaderboard-controls { padding: 0 20px 20px; }
        .search-bar {
            width: 100%; background: var(--surface-matte); border: 1px solid var(--border-glass);
            padding: 14px 20px; border-radius: 14px; color: #fff; font-size: 13px; outline: none;
            margin-bottom: 20px; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--accent-crimson); }

        .filter-row { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .f-btn {
            padding: 8px 16px; background: var(--surface-elevated); border: 1px solid var(--border-glass);
            border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase;
            color: var(--text-dim); white-space: nowrap; cursor: pointer;
        }
        .f-btn.active { background: var(--text-main); color: #000; border-color: #fff; }

        /* [3. RANKINGS LIST] */
        .rank-list { padding: 0 20px 120px; display: flex; flex-direction: column; gap: 12px; }
        .rank-row {
            background: var(--surface-matte); border: 1px solid var(--border-glass);
            padding: 12px 15px; border-radius: 16px; display: flex; align-items: center; gap: 15px;
            animation: slideIn 0.5s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .r-position { font-size: 14px; font-weight: 900; color: var(--text-dim); width: 25px; }
        .r-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-elevated); }
        .r-info { flex: 1; }
        .r-name-row { display: flex; align-items: center; gap: 6px; }
        .r-name { font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .r-badge { width: 14px; height: 14px; fill: var(--accent-crimson); }
        .r-game-tag { font-size: 8px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; display: block; }
        .r-points { text-align: right; }
        .r-val { font-size: 15px; font-weight: 900; color: var(--accent-crimson); }
        .r-lbl { font-size: 8px; color: var(--text-dim); text-transform: uppercase; display: block; }

        /* Hall of Fame Highlights */
        .hof-header { padding: 20px; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .hof-scroll { display: flex; gap: 15px; padding: 0 20px 30px; overflow-x: auto; scrollbar-width: none; }
        .hof-card {
            min-width: 140px; background: var(--surface-elevated); border: 1px solid var(--border-glass);
            padding: 20px 15px; border-radius: 20px; text-align: center;
        }
        .hof-icon { width: 24px; height: 24px; fill: var(--accent-gold); margin-bottom: 10px; }
        .hof-title { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .hof-name { font-size: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader-mount"></div>
    <div id="header-mount"></div>

    <main id="main-leaderboard" style="opacity: 0; transition: 0.6s;">
        
        <!-- [1. TOP 3 PODIUM] -->
        <section class="podium-section" id="podium-container">
            <!-- Rank 2 -->
            <div class="podium-item rank-2">
                <div class="p-avatar-wrap">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Rank2" class="p-avatar" id="p2-avatar">
                    <span class="p-rank-tag">#2</span>
                </div>
                <div class="p-name" id="p2-name">---</div>
                <div class="p-meta" id="p2-xp">0 XP</div>
            </div>
            <!-- Rank 1 -->
            <div class="podium-item rank-1">
                <div class="p-avatar-wrap">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Rank1" class="p-avatar" id="p1-avatar">
                    <span class="p-rank-tag">#1</span>
                </div>
                <div class="p-name" id="p1-name">---</div>
                <div class="p-meta" id="p1-xp">0 XP</div>
            </div>
            <!-- Rank 3 -->
            <div class="podium-item rank-3">
                <div class="p-avatar-wrap">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Rank3" class="p-avatar" id="p3-avatar">
                    <span class="p-rank-tag">#3</span>
                </div>
                <div class="p-name" id="p3-name">---</div>
                <div class="p-meta" id="p3-xp">0 XP</div>
            </div>
        </section>

        <!-- [2. HALL OF FAME HIGHLIGHTS] -->
        <div class="hof-header">Directives Highlights</div>
        <section class="hof-scroll">
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.83L19.17 19H4.83L12 5.83z"/></svg>
                <div class="hof-title">Biggest Prize</div>
                <div class="hof-name" id="hof-prize">Loading...</div>
            </div>
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                <div class="hof-title">Kill Leader</div>
                <div class="hof-name" id="hof-killer">Loading...</div>
            </div>
            <div class="hof-card">
                <svg class="hof-icon" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <div class="hof-title">Elite Ambassador</div>
                <div class="hof-name" id="hof-amb">Loading...</div>
            </div>
        </section>

        <!-- [3. GLOBAL RANKINGS ENGINE] -->
        <section class="leaderboard-controls">
            <input type="text" class="search-bar" id="player-search" placeholder="Search operative identity...">
            <div class="filter-row">
                <button class="f-btn active" onclick="filterLeaderboard('Global', this)">Global</button>
                <button class="f-btn" onclick="filterLeaderboard('PUBG', this)">PUBG Only</button>
                <button class="f-btn" onclick="filterLeaderboard('Free Fire', this)">Free Fire Only</button>
                <button class="f-btn" onclick="filterLeaderboard('Ambassadors', this)">Ambassadors</button>
            </div>
        </section>

        <section class="rank-list" id="rank-container">
            <!-- Dynamic Ranked Rows -->
            <p style="text-align: center; color: var(--text-dim); font-size: 11px; padding: 40px;">SYNCING SECURE GLOBAL RANKS...</p>
        </section>

        <div id="footer-mount"></div>
    </main>

    <div id="navigation-mount"></div>

    <script type="module">
        import { auth, db, onAuthStateChanged, collection, query, orderBy, limit, getDocs, where } from './firebase-config.js';

        // Component Loading Utility
        async function mount(id, file) {
            const res = await fetch(file);
            document.getElementById(id).innerHTML = await res.text();
            const scripts = document.getElementById(id).querySelectorAll('script');
            scripts.forEach(s => {
                const ns = document.createElement('script');
                ns.type = 'module'; ns.textContent = s.textContent;
                document.body.appendChild(ns);
            });
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await mount('loader-mount', '/loader.html');
            await mount('header-mount', '/header.html');
            await mount('navigation-mount', '/navigation.html');
            await mount('footer-mount', '/footer.html');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('main-leaderboard').style.opacity = '1';
                    initLeaderboard();
                    loadHallOfFame();
                } else { window.location.replace('/auth'); }
            });
        });

        // Fetch Rankings
        async function initLeaderboard(filter = 'Global') {
            const container = document.getElementById('rank-container');
            container.innerHTML = "";

            let q;
            if (filter === 'Global') {
                q = query(collection(db, "users"), orderBy("xp", "desc"), limit(50));
            } else if (filter === 'Ambassadors') {
                q = query(collection(db, "users"), where("isAmbassador", "==", true), orderBy("xp", "desc"), limit(50));
            } else {
                q = query(collection(db, "users"), where("favGame", "==", filter), orderBy("xp", "desc"), limit(50));
            }

            const snap = await getDocs(q);
            const players = [];
            snap.forEach(doc => players.push(doc.data()));

            // Update Top 3 Podium
            if(players.length >= 3) {
                // Rank 1
                document.getElementById('p1-name').innerText = players[0].name;
                document.getElementById('p1-avatar').src = players[0].avatar;
                document.getElementById('p1-xp').innerText = (players[0].xp || 0) + " XP";
                // Rank 2
                document.getElementById('p2-name').innerText = players[1].name;
                document.getElementById('p2-avatar').src = players[1].avatar;
                document.getElementById('p2-xp').innerText = (players[1].xp || 0) + " XP";
                // Rank 3
                document.getElementById('p3-name').innerText = players[2].name;
                document.getElementById('p3-avatar').src = players[2].avatar;
                document.getElementById('p3-xp').innerText = (players[2].xp || 0) + " XP";
            }

            // Render Rest (Rank 4+)
            players.slice(3).forEach((p, i) => {
                const pos = i + 4;
                container.innerHTML += `
                    <div class="rank-row">
                        <span class="r-position">#${pos}</span>
                        <img src="${p.avatar}" class="r-avatar">
                        <div class="r-info">
                            <div class="r-name-row">
                                <span class="r-name">${p.name}</span>
                                ${p.verified ? '<svg class="r-badge" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                            </div>
                            <span class="r-game-tag">${p.favGame || 'NE OPERATIVE'}</span>
                        </div>
                        <div class="r-points">
                            <span class="r-val">${p.xp || 0}</span>
                            <span class="r-lbl">XP Rank</span>
                        </div>
                    </div>
                `;
            });
        }

        async function loadHallOfFame() {
            const hSnap = await getDocs(query(collection(db, "hall_of_fame"), limit(1)));
            if(!hSnap.empty) {
                const data = hSnap.docs[0].data();
                document.getElementById('hof-prize').innerText = data.top_earner || "---";
                document.getElementById('hof-killer').innerText = data.top_slayer || "---";
                document.getElementById('hof-amb').innerText = data.top_ambassador || "---";
            }
        }

        window.filterLeaderboard = (type, btn) => {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initLeaderboard(type);
        };

        // Search logic
        document.getElementById('player-search').addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            document.querySelectorAll('.rank-row').forEach(row => {
                const name = row.querySelector('.r-name').innerText.toUpperCase();
                row.style.display = name.includes(val) ? 'flex' : 'none';
            });
        });

    </script>
</body>
</html>
