<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NE SPORTS | Global Leaderboard</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        :root {
            --bg-base: #050505;
            --surface: #121212;
            --surface-elevated: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-red: #D32F2F;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --gold: #D4AF37;
            --glass-bg: rgba(18, 18, 18, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }

        body { background-color: var(--bg-base); color: var(--text-main); padding-bottom: 100px; overflow-x: hidden; }

        /* Podium Design (Rank 1, 2, 3) */
        .podium-sec {
            padding: 40px 20px; display: flex; align-items: flex-end; justify-content: center; gap: 10px;
            background: linear-gradient(180deg, rgba(211, 47, 47, 0.05) 0%, var(--bg-base) 100%);
            border-bottom: 1px solid var(--border-subtle);
        }
        .podium-item { text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        .p-avatar {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--surface-elevated);
            margin-bottom: 10px; object-fit: cover;
        }
        .p-rank-label { font-size: 10px; font-weight: 900; background: var(--surface); padding: 4px 8px; border-radius: 6px; margin-bottom: 5px; }
        .p-name { font-size: 11px; font-weight: 700; text-transform: uppercase; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }

        /* 1st Place specific styling */
        .rank-1 .p-avatar { width: 85px; height: 85px; border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .rank-1 .p-rank-label { background: var(--gold); color: #000; }

        /* Rankings List */
        .rankings-list { padding: 20px; }
        .rank-row {
            background: var(--surface); border: 1px solid var(--border-subtle);
            padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .rank-num { font-size: 13px; font-weight: 900; color: var(--text-muted); width: 25px; }
        .rank-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .rank-info { flex: 1; }
        .rank-info h4 { font-size: 14px; font-weight: 700; text-transform: uppercase; }
        .rank-pts { font-size: 14px; font-weight: 800; color: var(--accent-red); }

        /* Directives (News) */
        .directive-header { padding: 10px 20px; font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .directives-scroll { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .directive-card {
            background: var(--surface); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 20px; border-left: 4px solid var(--accent-red);
        }
        .directive-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .directive-card p { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
        .directive-date { font-size: 9px; color: var(--accent-red); font-weight: 800; text-transform: uppercase; margin-top: 10px; display: block; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--glass-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-subtle);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); }
        .nav-item svg { width: 22px; height: 22px; fill: var(--text-muted); }
        .nav-item span { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: var(--accent-red); }
        .nav-item.active svg { fill: var(--accent-red); }
    </style>
</head>
<body>

    <div class="podium-sec" id="podium-container">
        <!-- Rank 2 -->
        <div class="podium-item rank-2">
            <div class="p-rank-label">2ND</div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=U2" class="p-avatar">
            <span class="p-name">Loading...</span>
        </div>
        <!-- Rank 1 -->
        <div class="podium-item rank-1">
            <div class="p-rank-label">1ST</div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=U1" class="p-avatar">
            <span class="p-name">Loading...</span>
        </div>
        <!-- Rank 3 -->
        <div class="podium-item rank-3">
            <div class="p-rank-label">3RD</div>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=U3" class="p-avatar">
            <span class="p-name">Loading...</span>
        </div>
    </div>

    <div class="rankings-list" id="rank-list">
        <!-- Rank 4+ Dynamic -->
    </div>

    <div class="directive-header">Latest System Directives</div>
    <div class="directives-scroll" id="news-list">
        <!-- News dynamically injected -->
        <div class="directive-card">
            <h3>Season 1 Deployment</h3>
            <p>All operatives are required to synchronize their squad profiles. Global Arena Season 1 starts now.</p>
            <span class="directive-date">Today • June 2024</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/home" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span>
        </a>
        <a href="/tournaments" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm11 0h-8v-2h8v2zm0-4h-8V7h8v2z"/></svg><span>Arena</span>
        </a>
        <a href="/teams" class="nav-item active">
             <svg viewBox="0 0 24 24"><path d="M16 11V3H8v8H2v10h20V11h-6zM10 5h4v14h-4V5zm-6 8h4v6H4v-6zm16 6h-4v-8h4v8z"/></svg><span>Ranks</span>
        </a>
        <a href="/profile" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span>
        </a>
    </nav>

    <script type="module">
        import { db, collection, query, orderBy, limit, getDocs } from './firebase-config.js';

        async function loadLeaderboard() {
            const q = query(collection(db, "users"), orderBy("xp", "desc"), limit(10));
            const snap = await getDocs(q);
            const players = [];
            snap.forEach(doc => players.push(doc.data()));

            if(players.length >= 3) {
                // Update Podium (Simplified mapping)
                const pItems = document.querySelectorAll('.podium-item');
                // Rank 2
                pItems[0].querySelector('.p-name').innerText = players[1].name;
                pItems[0].querySelector('.p-avatar').src = players[1].avatar;
                // Rank 1
                pItems[1].querySelector('.p-name').innerText = players[0].name;
                pItems[1].querySelector('.p-avatar').src = players[0].avatar;
                // Rank 3
                pItems[2].querySelector('.p-name').innerText = players[2].name;
                pItems[2].querySelector('.p-avatar').src = players[2].avatar;

                // Rank 4 to 10
                const list = document.getElementById('rank-list');
                list.innerHTML = "";
                players.slice(3).forEach((p, i) => {
                    list.innerHTML += `
                        <div class="rank-row">
                            <span class="rank-num">#${i + 4}</span>
                            <img src="${p.avatar}" class="rank-avatar">
                            <div class="rank-info"><h4>${p.name}</h4></div>
                            <div class="rank-pts">${p.xp} XP</div>
                        </div>
                    `;
                });
            }
        }
        loadLeaderboard();
    </script>
</body>
</html>
