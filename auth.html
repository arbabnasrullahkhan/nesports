<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Portal | NE SPORTS Enterprise</title>
    
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        :root {
            --bg: #050505;
            --surface: #0E0E0E;
            --surface-elevated: #161616;
            --accent: #D32F2F;
            --accent-hover: #B71C1C;
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Tech-Grid Background for Trust */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0;
        }

        /* Premium Toast */
        #status-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--surface-elevated); border: 1px solid var(--accent);
            padding: 14px 28px; border-radius: 12px; font-size: 13px; font-weight: 600;
            z-index: 9999; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex; align-items: center; gap: 10px;
        }

        .auth-box {
            width: 100%; max-width: 400px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 45px 35px;
            position: relative; z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.7s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-header { text-align: center; margin-bottom: 40px; }
        .auth-logo { width: 75px; margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(211, 47, 47, 0.2)); }
        .auth-title { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .auth-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.5px; }

        /* Form Logic */
        .auth-view { display: none; }
        .auth-view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Input Styling */
        .input-group { margin-bottom: 20px; position: relative; }
        .input-label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; padding-left: 5px; }
        .input-ctrl {
            width: 100%; padding: 16px 16px 16px 48px;
            background: var(--surface-elevated); border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 14px; transition: 0.3s;
        }
        .input-ctrl:focus { border-color: var(--accent); background: #121212; box-shadow: 0 0 20px rgba(211, 47, 47, 0.1); }
        
        .input-icon { position: absolute; left: 18px; top: 38px; width: 18px; height: 18px; fill: var(--text-muted); transition: 0.3s; }
        .input-ctrl:focus + .input-icon { fill: var(--accent); }

        /* Buttons */
        .btn-prime {
            width: 100%; padding: 18px; background: var(--accent); color: #fff;
            border: none; border-radius: 14px; font-size: 14px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            letter-spacing: 1px;
        }
        .btn-prime:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-prime:active { transform: scale(0.97); }
        .btn-prime:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-google {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 14px; font-size: 13px; font-weight: 700;
            margin-top: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .auth-footer { margin-top: 30px; text-align: center; font-size: 13px; color: var(--text-muted); }
        .auth-link { color: var(--accent); font-weight: 700; cursor: pointer; text-decoration: none; }
        .forgot-pass { display: block; text-align: right; font-size: 11px; color: var(--text-muted); margin-top: -12px; margin-bottom: 25px; cursor: pointer; }

        /* Loader */
        .spin { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Security Badge for Trust */
        .trust-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 20px; font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
        }
        .trust-badge svg { width: 12px; height: 12px; fill: var(--text-muted); }

    </style>
</head>
<body>

    <div id="status-toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="toast-msg">SYSTEM MESSAGE</span>
    </div>

    <div class="auth-box">
        <div class="auth-header">
            <img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" class="auth-logo" alt="NE Logo">
            <h2 id="view-title">Login</h2>
            <p class="auth-sub" id="view-subtitle">Secure Access to NE SPORTS Platform</p>
        </div>

        <!-- [LOGIN] -->
        <div id="view-login" class="auth-view active">
            <div class="input-group">
                <label class="input-label">Operative Email</label>
                <input type="email" id="log-email" class="input-ctrl" placeholder="name@domain.com">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <div class="input-group">
                <label class="input-label">Access Password</label>
                <input type="password" id="log-pass" class="input-ctrl" placeholder="••••••••">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </div>
            <span class="forgot-pass" onclick="window.switchView('recovery')">Signal Lost? Recover Access</span>
            
            <button class="btn-prime" onclick="window.processAuth('login')" id="btn-login">
                <div class="spin" id="spin-login"></div>
                <span id="txt-login">Initialize Session</span>
            </button>
        </div>

        <!-- [REGISTER] -->
        <div id="view-register" class="auth-view">
            <div class="input-group">
                <label class="input-label">Operative UID/Name</label>
                <input type="text" id="reg-name" class="input-ctrl" placeholder="In-Game Name">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="input-group">
                <label class="input-label">Deployment Email</label>
                <input type="email" id="reg-email" class="input-ctrl" placeholder="operative@nesports.com">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <div class="input-group">
                <label class="input-label">Secure Password</label>
                <input type="password" id="reg-pass" class="input-ctrl" placeholder="Min 6 Characters">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </div>
            
            <button class="btn-prime" onclick="window.processAuth('register')" id="btn-reg">
                <div class="spin" id="spin-reg"></div>
                <span id="txt-reg">Establish Profile</span>
            </button>
        </div>

        <!-- [RECOVERY] -->
        <div id="view-recovery" class="auth-view">
            <div class="input-group">
                <label class="input-label">Registered Email</label>
                <input type="email" id="rec-email" class="input-ctrl" placeholder="Enter your email">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </div>
            <button class="btn-prime" onclick="window.processAuth('recovery')" id="btn-rec">
                <div class="spin" id="spin-rec"></div>
                <span id="txt-rec">Dispatch Recovery Signal</span>
            </button>
        </div>

        <!-- Social Section -->
        <div id="social-node">
            <div style="display: flex; align-items: center; margin: 25px 0; opacity: 0.2;">
                <div style="flex:1; height:1px; background:#fff;"></div>
                <div style="padding: 0 15px; font-size: 10px; font-weight: 900; letter-spacing: 1px;">ENCRYPTED AUTH</div>
                <div style="flex:1; height:1px; background:#fff;"></div>
            </div>
            <button class="btn-google" onclick="window.handleGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
                Continue with Google
            </button>
        </div>

        <div class="auth-footer">
            <span id="switch-text">New Operative? </span>
            <span class="auth-link" id="switch-btn" onclick="window.toggleMain()">Join the Elite</span>
        </div>

        <div class="trust-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 15l-4-4 1.41-1.41L10 13.17l5.59-5.59L17 9l-7 7z"/></svg>
            Enterprise SSL Secured System
        </div>
    </div>

    <!-- [CORE LOGIC MODULE] -->
    <script type="module">
        import { 
            auth, db, googleProvider,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signInWithPopup,
            doc, getDoc, setDoc 
        } from './firebase-config.js';

        let currentView = 'login';

        // 1. Toast Engine
        const showToast = (msg) => {
            const el = document.getElementById('status-toast');
            document.getElementById('toast-msg').innerText = msg;
            el.style.top = '30px';
            setTimeout(() => el.style.top = '-100px', 4500);
        };

        // 2. Loading Controller
        const setLoad = (type, state) => {
            const btn = document.getElementById(`btn-${type}`);
            const spin = document.getElementById(`spin-${type}`);
            const txt = document.getElementById(`txt-${type}`);
            btn.disabled = state;
            spin.style.display = state ? 'block' : 'none';
            txt.style.display = state ? 'none' : 'block';
        };

        // 3. UI Switcher (Attached to Window for onclick access)
        window.switchView = (view) => {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            currentView = view;
            
            const title = document.getElementById('view-title');
            const sub = document.getElementById('view-subtitle');
            const fText = document.getElementById('switch-text');
            const fBtn = document.getElementById('switch-btn');
            const social = document.getElementById('social-node');

            if(view === 'login') {
                title.innerText = "Login";
                sub.innerText = "Secure Access to NE SPORTS Platform";
                fText.innerText = "New Operative? ";
                fBtn.innerText = "Join the Elite";
                social.style.display = 'block';
            } else if(view === 'register') {
                title.innerText = "New Recruitment";
                sub.innerText = "Establish Your Professional Gaming Identity";
                fText.innerText = "Existing Operative? ";
                fBtn.innerText = "Return to Base";
                social.style.display = 'block';
            } else {
                title.innerText = "Access Recovery";
                sub.innerText = "Initiate Secure Protocol Reset";
                fText.innerText = "Signal Found? ";
                fBtn.innerText = "Back to Base";
                social.style.display = 'none';
            }
        };

        window.toggleMain = () => {
            if(currentView === 'login' || currentView === 'recovery') window.switchView('register');
            else window.switchView('login');
        };

        // 4. Firestore Profile Engine
        const initProfile = async (user, name = null) => {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if(!snap.exists()) {
                const code = "NES-" + Math.floor(100000 + Math.random() * 900000);
                await setDoc(ref, {
                    uid: user.uid,
                    name: name || user.displayName || "Gamer_" + user.uid.substring(0,4),
                    email: user.email,
                    wallet: 0, xp: 0, level: "Bronze",
                    referralCode: code, isAmbassador: false,
                    avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + user.uid,
                    createdAt: new Date().toISOString()
                });
            }
        };

        // 5. Auth Processors
        window.processAuth = async (type) => {
            if(type === 'login') {
                const email = document.getElementById('log-email').value.trim();
                const pass = document.getElementById('log-pass').value;
                if(!email || !pass) return showToast("ERROR: Missing Credentials");
                setLoad('login', true);
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                    window.location.replace("/home");
                } catch(e) { showToast("DENIED: Invalid Credentials"); setLoad('login', false); }
            }

            if(type === 'register') {
                const name = document.getElementById('reg-name').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const pass = document.getElementById('reg-pass').value;
                if(!name || !email || !pass) return showToast("ERROR: Data Incomplete");
                if(pass.length < 6) return showToast("WEAK: Password min 6 chars");
                setLoad('reg', true);
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await initProfile(res.user, name);
                    window.location.replace("/home");
                } catch(e) { showToast("FAILED: Account already exists"); setLoad('reg', false); }
            }

            if(type === 'recovery') {
                const email = document.getElementById('rec-email').value.trim();
                if(!email) return showToast("ERROR: Email required");
                setLoad('rec', true);
                try {
                    await sendPasswordResetEmail(auth, email);
                    showToast("SENT: Check your transmission hub (Inbox)");
                    window.switchView('login');
                } catch(e) { showToast("ERROR: Signal not found"); }
                setLoad('rec', false);
            }
        };

        window.handleGoogle = async () => {
            try {
                const res = await signInWithPopup(auth, googleProvider);
                await initProfile(res.user);
                window.location.replace("/home");
            } catch(e) { showToast("AUTH CANCELED"); }
        };

    </script>
</body>
</html>
