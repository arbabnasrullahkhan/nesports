<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Core Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    
    <!-- SEO & Identity -->
    <title>NE SPORTS | The Ultimate Esports Ecosystem</title>
    <meta name="description" content="Join NE SPORTS, the premium esports platform. Compete in daily tournaments, build your squad, and become an official brand ambassador.">
    <meta name="keywords" content="Esports, PUBG Tournaments, Free Fire Matches, NE Sports, Gaming Platform, Pakistan Esports">
    <meta name="author" content="NE SPORTS Enterprise">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="NE SPORTS | Premium Esports Arena">
    <meta property="og:description" content="Compete, earn, and build your gaming identity with NE SPORTS.">
    <meta property="og:image" content="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">
    <meta property="og:url" content="https://nesports.vercel.app">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NE SPORTS | Elite Gaming">
    <meta name="twitter:description" content="The ultimate competitive gaming platform.">
    <meta name="twitter:image" content="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png">

    <style>
        /* Premium Corporate Design System */
        :root {
            --bg-base: #050505; /* Deep Matte Black */
            --surface: #121212; /* Elevated Surface */
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-red: #D32F2F; /* Cinematic Crimson */
            --border-subtle: rgba(255, 255, 255, 0.05);
        }

        /* Reset & Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'San Francisco', 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-base);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Grid (Subtle Corporate Tech Feel) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
        }

        /* Main Content Wrapper */
        .boot-sequence {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bootFadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* Brand Identity */
        .brand-logo {
            width: 130px;
            height: auto;
            margin-bottom: 24px;
            filter: drop-shadow(0px 15px 30px rgba(0,0,0,0.9));
        }

        .brand-title {
            color: var(--text-main);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Hardware-style Progress Bar */
        .system-loader {
            width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loader-track {
            width: 100%;
            height: 3px;
            background-color: var(--surface);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 0%;
            background-color: var(--accent-red);
            box-shadow: 0 0 10px rgba(211, 47, 47, 0.4);
            animation: bootProgress 2.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        /* System Logs Text */
        .status-terminal {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-family: 'Courier New', Courier, monospace; /* Terminal vibe */
        }

        /* Powered By Footer */
        .footer-branding {
            position: absolute;
            bottom: 30px;
            color: var(--text-muted);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 1;
            opacity: 0.5;
        }

        /* Smooth Keyframes */
        @keyframes bootFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes bootProgress {
            0% { width: 0%; }
            30% { width: 40%; }
            70% { width: 75%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="boot-sequence">
        <img src="https://uploads.onecompiler.io/42yatf6fu/1781497050019/nesports.png" alt="NE SPORTS Logo" class="brand-logo">
        <h1 class="brand-title">NE SPORTS</h1>
        
        <div class="system-loader">
            <div class="loader-track">
                <div class="loader-fill"></div>
            </div>
            <div class="status-terminal" id="sys-status">SYS_BOOT: INITIALIZING...</div>
        </div>
    </div>

    <div class="footer-branding">ENTERPRISE ESPORTS ENGINE</div>

    <!-- Firebase Authentication & Routing Logic -->
    <script type="module">
        import { auth, onAuthStateChanged } from './firebase-config.js';

        const statusText = document.getElementById('sys-status');

        // Cinematic Terminal Text Updates
        setTimeout(() => { statusText.innerText = "SYS_BOOT: SECURING CONNECTION..."; }, 800);
        setTimeout(() => { statusText.innerText = "SYS_BOOT: AUTHENTICATING USER..."; }, 1600);

        // Core App Routing based on Auth State
        setTimeout(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    statusText.innerText = "SYS_BOOT: ACCESS GRANTED";
                    statusText.style.color = "#4CAF50"; // Subtle success green
                    
                    // Delay slightly for visual satisfaction before redirect
                    setTimeout(() => {
                        // Using clean Vercel URL routing (no .html)
                        window.location.replace("/home");
                    }, 400);
                } else {
                    statusText.innerText = "SYS_BOOT: REDIRECTING TO PORTAL...";
                    
                    setTimeout(() => {
                        // Using clean Vercel URL routing (no .html)
                        window.location.replace("/auth");
                    }, 400);
                }
            });
        }, 2500); // Waits for progress bar animation to complete
    </script>
</body>
</html>
